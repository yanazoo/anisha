<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>アニしゃ / AniFrame</title>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root {
  --white:#ffffff; --black:#0d0d0d; --gray:#888; --light:#f4f6f8;
  --border:#e2e6ea; --sky:#e8f4fd; --sky2:#d0eaf8; --sky3:#b8dff5;
  --sky-dark:#4a9cc7; --accent:#1a7fc1; --muted:#666;
  --glass:rgba(232,244,253,0.96); --gb:rgba(74,156,199,0.45);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;background:var(--white);color:var(--black);font-family:'Yomogi',cursive;overflow:hidden;}

/* HEADER */
header{position:fixed;top:0;left:0;right:0;z-index:300;height:52px;
background:rgba(255,255,255,0.96);backdrop-filter:blur(16px);
border-bottom:1px solid var(--border);
display:flex;align-items:center;padding:0 16px;gap:12px;}
.menu-trigger{width:44px;height:44px;flex-shrink:0;display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:6px;cursor:pointer;
border:none;background:transparent;border-radius:8px;transition:all .2s;}
.menu-trigger:hover{background:var(--sky2);}
.menu-trigger:active{transform:scale(0.95);}
.hl{width:22px;height:2.5px;background:#999;border-radius:2px;display:block;transition:all .3s;}
.menu-trigger.open .hl:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.menu-trigger.open .hl:nth-child(2){opacity:0;}
.menu-trigger.open .hl:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}
.logo{display:flex;align-items:baseline;gap:8px;flex-shrink:0;}
.logo-ja{font-size:24px;color:var(--black);}
.logo-sl{color:var(--border);font-size:18px;}
.logo-en{font-size:9px;color:var(--sky-dark);letter-spacing:.12em;}
.header-search{flex:1;max-width:320px;height:34px;padding:0 12px;
background:var(--sky);border:1px solid var(--gb);border-radius:6px;
color:var(--black);font-family:‘Yomogi’,cursive;font-size:12px;outline:none;transition:all .2s;}
.header-search:focus{background:var(--white);border-color:var(--sky-dark);}
.header-search::placeholder{color:#aac4d8;}
.header-right{margin-left:auto;}
.h-btn{height:34px;padding:0 14px;border-radius:6px;font-family:‘Yomogi’,cursive;
font-size:11px;font-weight:700;cursor:pointer;border:none;
background:var(--accent);color:var(--white);transition:all .2s;}
.h-btn:hover{background:#1568a0;}
.h-btn:active{transform:scale(0.96);}

/* SLIDE MENU */
.menu-overlay{position:fixed;inset:0;z-index:400;background:rgba(13,13,13,0.3);
backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .3s;}
.menu-overlay.show{opacity:1;pointer-events:all;}
.slide-menu{position:fixed;top:0;left:0;bottom:0;z-index:500;width:300px;
background:rgba(255,255,255,0.99);border-right:1px solid var(--border);
transform:translateX(-100%);transition:transform .35s cubic-bezier(0.4,0,0.2,1);
display:flex;flex-direction:column;overflow:hidden;}
.slide-menu.open{transform:translateX(0);}
.menu-header{padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(232,244,253,0.99);flex-shrink:0;}
.menu-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.menu-title{font-size:21px;color:var(--black);}
.menu-close{width:30px;height:30px;border-radius:6px;border:1px solid var(--gb);
background:var(--white);display:flex;align-items:center;justify-content:center;
font-size:14px;cursor:pointer;color:var(--muted);transition:all .15s;}
.menu-close:hover{background:var(--sky2);}
.menu-search{width:100%;height:34px;padding:0 12px;background:var(--white);
border:1px solid var(--gb);border-radius:6px;color:var(--black);
font-family:‘Yomogi’,cursive;font-size:12px;outline:none;}
.menu-stats{display:flex;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.menu-stat{flex:1;text-align:center;padding:8px;background:var(--sky);
border-radius:6px;border:1px solid var(--gb);}
.menu-stat-num{font-size:23px;color:var(--accent);line-height:1;}
.menu-stat-label{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.06em;}
.menu-body{flex:1;overflow-y:auto;}
.menu-body::-webkit-scrollbar{width:3px;}
.menu-body::-webkit-scrollbar-thumb{background:var(--sky3);}
.work-section{border-bottom:1px solid var(--border);}
.work-header{display:flex;align-items:center;justify-content:space-between;
padding:12px 20px;cursor:pointer;transition:background .15s;user-select:none;}
.work-header:hover{background:var(--sky);}
.work-header-left{display:flex;align-items:center;gap:10px;}
.work-emoji{font-size:18px;}
.work-name{font-size:15px;font-weight:700;color:var(--black);}
.work-count{font-size:13px;color:var(--white);background:var(--accent);
padding:2px 10px;border-radius:10px;}
.work-chevron{font-size:10px;color:var(--muted);transition:transform .25s;}
.work-section.open .work-chevron{transform:rotate(180deg);}
.work-spots{display:none;}
.work-section.open .work-spots{display:block;}
.menu-spot-item{display:flex;align-items:center;gap:10px;padding:10px 20px 10px 48px;
cursor:pointer;transition:background .15s;border-top:1px solid var(--border);}
.menu-spot-item:hover{background:var(--sky);}
.menu-spot-item.active{background:var(--sky2);}
.menu-spot-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.menu-spot-name{font-size:13px;font-weight:700;flex:1;}
.menu-spot-loc{font-size:10px;color:var(--muted);}
.menu-spot-photos{font-size:10px;color:var(--muted);flex-shrink:0;}

/* MAP */
.map-wrap{position:fixed;top:52px;left:0;right:0;bottom:0;z-index:1;}
#map{width:100%;height:100%;}
.leaflet-tile{filter:saturate(0.35) brightness(1.05);}
.leaflet-container{background:var(--light);}
.leaflet-control-zoom a{background:rgba(255,255,255,0.95)!important;color:var(--black)!important;border-color:var(--border)!important;border-radius:0!important;}
.pin-wrap{display:flex;flex-direction:column;align-items:center;cursor:pointer;}
.pin-head{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
justify-content:center;font-size:15px;border:2.5px solid rgba(255,255,255,0.9);
box-shadow:0 3px 10px rgba(0,0,0,0.2);}
.pin-tail{width:2px;height:7px;background:rgba(0,0,0,0.25);}
.map-badge{position:absolute;top:14px;right:14px;z-index:200;
background:var(--glass);border:1px solid var(--gb);
backdrop-filter:blur(12px);padding:10px 14px;border-radius:8px;}
.map-badge-num{font-size:28px;line-height:1;color:var(--black);}
.map-badge-label{font-size:9px;color:var(--sky-dark);letter-spacing:.08em;margin-top:2px;}

/* POPUP */
.leaflet-popup-content-wrapper{background:var(--glass)!important;border:1px solid var(--gb)!important;
border-radius:12px!important;box-shadow:0 8px 32px rgba(74,156,199,0.18)!important;
backdrop-filter:blur(16px)!important;color:var(--black)!important;padding:0!important;}
.leaflet-popup-content{margin:0!important;}
.leaflet-popup-tip{background:var(--glass)!important;}
.leaflet-popup-close-button{color:var(--sky-dark)!important;font-size:18px!important;font-weight:700!important;
width:28px!important;height:28px!important;line-height:28px!important;text-align:center!important;
top:8px!important;right:8px!important;padding:0!important;border-radius:50%!important;
background:var(--sky2)!important;}
.popup-body{padding:16px 18px;min-width:190px;font-family:‘Yomogi’,cursive;}
.popup-title{font-size:18px;font-family:‘Yomogi’,cursive;color:var(--black);margin-bottom:3px;}
.popup-work{font-size:11px;font-family:‘Yomogi’,cursive;font-weight:700;color:var(--accent);margin-bottom:4px;}
.popup-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.popup-tag{font-size:9px;font-family:‘Yomogi’,cursive;color:var(--sky-dark);background:var(--sky);
border:1px solid var(--gb);padding:2px 8px;border-radius:4px;}
.popup-cta{width:100%;height:34px;font-family:‘Yomogi’,cursive;border-radius:6px;background:var(--accent);
border:none;color:var(--white);font-family:‘Yomogi’,cursive;font-size:11px;
font-weight:700;cursor:pointer;transition:background .15s;}
.popup-cta:hover{background:#1568a0;}

/* DETAIL PANEL */
.detail-panel{position:absolute;bottom:0;left:0;right:0;z-index:200;
background:var(--glass);border-top:1px solid var(--gb);backdrop-filter:blur(20px);
transform:translateY(100%);transition:transform .35s cubic-bezier(0.4,0,0.2,1);
box-shadow:0 -4px 24px rgba(74,156,199,0.12);}
.detail-panel.show{transform:translateY(0);}
.detail-inner{display:flex;align-items:stretch;}
.detail-scenes{display:flex;border-right:1px solid var(--gb);flex-shrink:0;}
.scene-box{width:88px;height:76px;display:flex;flex-direction:column;
align-items:center;justify-content:center;gap:3px;border-right:1px solid var(--gb);}
.scene-box:last-child{border-right:none;}
.scene-emoji{font-size:22px;}
.scene-label{font-size:8px;color:var(--sky-dark);letter-spacing:.1em;text-transform:uppercase;}
.detail-body{flex:1;padding:14px 18px;display:flex;align-items:center;gap:16px;}
.detail-text{flex:1;min-width:0;}
.detail-title{font-size:20px;line-height:1;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.detail-work{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:7px;}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;}
.detail-tag{font-size:9px;color:var(--sky-dark);background:var(--sky);border:1px solid var(--gb);padding:2px 8px;border-radius:4px;}
.detail-actions{display:flex;gap:8px;flex-shrink:0;}
.d-btn{height:36px;padding:0 16px;border-radius:6px;font-family:‘Yomogi’,cursive;
font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;
border:1px solid var(--gb);background:var(--sky);color:var(--black);}
.d-btn:hover{background:var(--sky2);border-color:var(--sky-dark);}
.d-btn:active{transform:scale(0.96);}
.d-btn.fill{background:var(--accent);border-color:var(--accent);color:var(--white);}
.d-btn.fill:hover{background:#1568a0;}
.d-btn.close{color:var(--muted);}

/* MOBILE SHEET */
.mobile-sheet{display:none;position:fixed;bottom:0;left:0;right:0;z-index:350;
background:var(--glass);border-top:1px solid var(--gb);border-radius:16px 16px 0 0;
backdrop-filter:blur(20px);box-shadow:0 -4px 32px rgba(74,156,199,0.18);
transform:translateY(100%);transition:transform .35s cubic-bezier(0.4,0,0.2,1);
padding-bottom:env(safe-area-inset-bottom);}
.mobile-sheet.show{transform:translateY(0);}
.sheet-drag{height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.sheet-drag-bar{width:32px;height:3px;background:var(--sky3);border-radius:2px;}
.sheet-body{padding:0 20px 20px;}
.sheet-emoji{font-size:32px;margin-bottom:6px;}
.sheet-title{font-size:26px;line-height:1;margin-bottom:3px;}
.sheet-work{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:10px;}
.sheet-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.sheet-tag{font-size:9px;color:var(--sky-dark);background:var(--sky);border:1px solid var(--gb);padding:3px 10px;border-radius:4px;}
.sheet-btns{display:flex;gap:8px;}
.sheet-btns .d-btn{flex:1;height:42px;}

/* DRAWER */
.spot-drawer{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;
background:var(--glass);border-top:1px solid var(--gb);border-radius:16px 16px 0 0;
backdrop-filter:blur(20px);max-height:65vh;flex-direction:column;
transform:translateY(calc(100% - 46px));transition:transform .35s cubic-bezier(0.4,0,0.2,1);}
.spot-drawer.expanded{transform:translateY(0);}
.drawer-peek{height:46px;flex-shrink:0;display:flex;align-items:center;
justify-content:space-between;padding:0 20px;cursor:pointer;border-bottom:1px solid var(--gb);}
.drawer-peek-left{display:flex;align-items:center;gap:10px;}
.drawer-peek-num{font-size:22px;color:var(--accent);line-height:1;}
.drawer-peek-label{font-size:13px;color:var(--sky-dark);}
.drawer-chevron{font-size:11px;color:var(--sky-dark);transition:transform .3s;}
.spot-drawer.expanded .drawer-chevron{transform:rotate(180deg);}
.drawer-list{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch;padding:6px 10px 20px;}
.drawer-list::-webkit-scrollbar{display:none;}
.spot-row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:8px;
margin-bottom:4px;cursor:pointer;transition:background .15s;border:1px solid transparent;}
.spot-row:hover{background:var(--sky);border-color:var(--gb);}
.spot-row.active{background:var(--sky2);border-color:var(--sky-dark);}
.spot-row-idx{font-size:12px;color:var(--sky3);width:22px;flex-shrink:0;text-align:right;}
.spot-row-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;
justify-content:center;font-size:17px;flex-shrink:0;background:var(--sky);border:1px solid var(--gb);}
.spot-row.active .spot-row-icon{background:var(--sky2);}
.spot-row-body{flex:1;min-width:0;}
.spot-row-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.spot-row-work{font-size:10px;color:var(--accent);font-weight:700;margin-top:1px;}
.spot-row-loc{font-size:10px;color:var(--muted);margin-top:1px;}
.spot-row-count{font-size:10px;color:var(--sky-dark);flex-shrink:0;text-align:right;}

/* LOADING */
.loading{position:fixed;inset:0;z-index:1000;background:rgba(255,255,255,0.98);
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading.hide{display:none;}
.loading-logo{font-size:72px;color:var(--black);line-height:1;}
.loading-en{font-size:13px;color:var(--sky-dark);letter-spacing:.15em;}
.loading-tagline{font-size:15px;color:var(--sky-dark);}
.loading-bar{width:160px;height:2px;background:var(--sky3);border-radius:1px;overflow:hidden;}
.loading-fill{height:100%;background:var(--accent);animation:ls 1.6s ease-in-out infinite;}
@keyframes ls{0%{width:0;margin-left:0}50%{width:60%}100%{width:0;margin-left:100%}}
.loading-sub{font-size:12px;color:var(--sky-dark);letter-spacing:.06em;}

/* ERROR */
.error-screen{position:fixed;inset:0;z-index:1000;background:var(--sky);
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
.error-screen.hide{display:none;}
.error-title{font-size:36px;color:#c0392b;}
.error-msg{font-size:12px;color:var(--muted);text-align:center;max-width:280px;line-height:1.8;}
.retry-btn{height:40px;padding:0 28px;background:var(--accent);color:var(--white);
border:none;border-radius:6px;font-family:‘Yomogi’,cursive;font-size:12px;font-weight:700;cursor:pointer;}

/* AUTH */
.auth-avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--sky3);cursor:pointer;flex-shrink:0;}
.auth-btn{height:32px;padding:0 12px;border-radius:16px;border:1.5px solid var(--accent);background:transparent;color:var(--accent);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.auth-btn:hover{background:var(--accent);color:#fff;}
.auth-modal-bg{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,0.45);backdrop-filter:blur(4px);display:flex;align-items:flex-end;justify-content:center;}
.auth-modal-bg.hide{display:none;}
.auth-modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:28px 24px 40px;box-shadow:0 -8px 40px rgba(0,0,0,0.18);}
.auth-modal-title{font-size:18px;font-weight:700;font-family:'Yomogi',cursive;color:var(--black);text-align:center;margin-bottom:6px;}
.auth-modal-sub{font-size:11px;color:var(--muted);text-align:center;margin-bottom:24px;line-height:1.7;}
.auth-google-btn{width:100%;height:48px;border-radius:12px;border:1.5px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;gap:10px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:12px;}
.auth-google-btn:hover{background:var(--sky);border-color:var(--sky-dark);}
.auth-google-icon{width:20px;height:20px;}
.auth-modal-close{width:100%;height:40px;border:none;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;margin-top:4px;}
.auth-menu-section{border-top:1px solid var(--border);margin-top:16px;padding-top:14px;}
.auth-user-row{display:flex;align-items:center;gap:10px;padding:10px 0;}
.auth-user-name{font-size:13px;font-weight:700;color:var(--black);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.auth-user-mail{font-size:10px;color:var(--muted);}
.auth-signout-btn{height:32px;padding:0 14px;border-radius:8px;border:1.5px solid #e57373;background:transparent;color:#e57373;font-size:11px;font-weight:700;cursor:pointer;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
background:var(--glass);border:1px solid var(--gb);backdrop-filter:blur(16px);
color:var(--black);padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;
box-shadow:0 4px 20px rgba(74,156,199,0.2);transition:transform .25s ease;
z-index:2000;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* THUMBNAILS */
.scene-img{width:100%;height:100%;object-fit:cover;border-radius:0;display:block;}
.popup-thumb{display:block;width:calc(100% + 36px);height:76px;object-fit:cover;margin:-16px -18px 10px;border-radius:10px 10px 0 0;}
.sheet-imgs{display:none;gap:8px;margin-bottom:14px;}
.sheet-imgs.show{display:flex;}
.sheet-img-wrap{flex:1;border-radius:10px;overflow:hidden;border:1px solid var(--gb);position:relative;}
.sheet-img{width:100%;height:88px;object-fit:cover;display:block;}
.sheet-img-label{position:absolute;bottom:0;left:0;right:0;padding:3px 8px;background:rgba(0,0,0,0.52);color:#fff;font-size:9px;font-weight:700;letter-spacing:.06em;}

@media(max-width:768px){
.detail-panel{display:none!important;}
.mobile-sheet{display:block;}
.spot-drawer{display:flex;}
.map-badge{top:10px;right:10px;}
.header-search{display:none;}
}
</style>

</head>
<body>

<div class="loading" id="loading">
  <div class="loading-logo">アニしゃ</div>
  <div class="loading-en">AniFrame</div>
  <div class="loading-tagline">あのシーンを、あなたの手で。</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-sub" id="splashSub">Loading...</div>
</div>

<div class="error-screen hide" id="errorScreen">
  <div class="error-title">接続エラー</div>
  <div class="error-msg" id="errorMsg">データの取得に失敗しました。</div>
  <button class="retry-btn" onclick="location.reload()">再試行</button>
</div>

<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

<div class="slide-menu" id="slideMenu">
  <div class="menu-header">
    <div class="menu-header-top">
      <div class="menu-title">聖地リスト</div>
      <div class="menu-close" onclick="closeMenu()">✕</div>
    </div>
    <input class="menu-search" type="search" placeholder="🔍 作品名・場所で検索..." oninput="menuSearch(this.value)">
  </div>
  <div class="menu-stats">
    <div class="menu-stat"><div class="menu-stat-num" id="menuStatSpots">—</div><div class="menu-stat-label">Spots</div></div>
    <div class="menu-stat"><div class="menu-stat-num" id="menuStatWorks">—</div><div class="menu-stat-label">Works</div></div>
    <div class="menu-stat"><div class="menu-stat-num" id="menuStatPhotos">—</div><div class="menu-stat-label">Photos</div></div>
  </div>
  <div class="menu-body" id="menuBody"></div>
</div>

<header>
  <div class="menu-trigger" id="menuTrigger" onclick="toggleMenu()">
    <div class="hl"></div><div class="hl"></div><div class="hl"></div>
  </div>
  <div class="logo">
    <span class="logo-ja">アニしゃ</span>
    <span class="logo-sl">/</span>
    <span class="logo-en">AniFrame</span>
  </div>
  <input class="header-search" type="search" placeholder="🔍 作品名・場所で検索..." oninput="searchSpots(this.value)">
  <div class="header-right" style="display:flex;align-items:center;gap:8px;">
    <button class="h-btn" onclick="requireAuthThen(()=>location.href='/register.html')">＋ 登録</button>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://zzpfnszijxkfxtietilr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6cGZuc3ppanhrZnh0aWV0aWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTI2MzMsImV4cCI6MjA5MDU4ODYzM30.gqVLopJ3kveG1YwAcF6LQ7GFS2tZ0VRlHAG7M4je2Z0';

// ── Supabase Auth ─────────────────────────────────────────
const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;
let _authPendingCallback = null;

sbClient.auth.onAuthStateChange((event, session) => {
  currentUser = session?.user || null;
  updateAuthUI();
  if (currentUser && _authPendingCallback) {
    const cb = _authPendingCallback; _authPendingCallback = null;
    closeAuthModal(); cb();
  }
});

function updateAuthUI() {
  const btn  = document.getElementById('authHeaderBtn');
  const av   = document.getElementById('authAvatar');
  const mav  = document.getElementById('authModalAvatar');
  const mname = document.getElementById('authModalName');
  const memail = document.getElementById('authModalEmail');
  const signInArea = document.getElementById('authSignInArea');
  const userArea   = document.getElementById('authUserArea');
  if (!btn) return;
  if (currentUser) {
    const meta = currentUser.user_metadata || {};
    const avatarUrl = meta.avatar_url || meta.picture || '';
    btn.style.display = 'none';
    av.style.display = 'block';
    av.src = avatarUrl || 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%234a9cc7"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>';
    if (mav)    { mav.src = av.src; }
    if (mname)  { mname.textContent = meta.full_name || meta.name || 'ユーザー'; }
    if (memail) { memail.textContent = currentUser.email || ''; }
    if (signInArea) signInArea.style.display = 'none';
    if (userArea)   userArea.style.display = 'block';
  } else {
    btn.style.display = 'block';
    av.style.display = 'none';
    if (signInArea) signInArea.style.display = 'block';
    if (userArea)   userArea.style.display = 'none';
  }
}

async function signInWithGoogle() {
  await sbClient.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
}

async function signOut() {
  await sbClient.auth.signOut();
  closeAuthModal();
  showToast('ログアウトしました');
}

function openAuthModal() {
  document.getElementById('authModalBg').classList.remove('hide');
}
function closeAuthModal() {
  document.getElementById('authModalBg').classList.add('hide');
}

// ログイン必須アクション
function requireAuthThen(callback) {
  if (currentUser) { callback(); return; }
  _authPendingCallback = callback;
  openAuthModal();
}
// ────────────────────────────────────────────────────────

const map = L.map('map',{center:[36.5,137.5],zoom:6,zoomControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

const tagColors={kimi:'#e05a6a',slam:'#2ecc71',tenki:'#7c5cbf',other:'#e6a817'};
const statusStyle={
  unconfirmed:{opacity:'0.45',border:'2px dashed rgba(255,255,255,0.6)',extra:''},
  discussing:{opacity:'1',border:'2.5px solid #f59e0b',extra:'box-shadow:0 0 0 3px rgba(245,158,11,0.35),0 3px 10px rgba(0,0,0,0.2);'},
  confirmed:{opacity:'1',border:'2.5px solid rgba(255,255,255,0.9)',extra:''},
  official:{opacity:'1',border:'2.5px solid #fbbf24',extra:'box-shadow:0 0 0 3px rgba(251,191,36,0.5),0 3px 10px rgba(0,0,0,0.2);'},
};
let allSpots=[],filteredSpots=[],markers={},currentSpot=null,drawerOpen=false,menuOpen=false;

function makeIcon(emoji,tag,status){
  const c=tagColors[tag]||'#888';
  const st=statusStyle[status]||statusStyle.confirmed;
  const badge=status==='official'?'<div style="position:absolute;top:-4px;right:-4px;font-size:9px;line-height:1">⭐</div>':'';
  return L.divIcon({className:'',
    html:'<div class="pin-wrap" style="opacity:'+st.opacity+'"><div class="pin-head" style="position:relative;background:'+c+';border:'+st.border+';'+st.extra+'"><span>'+(emoji||'📍')+'</span>'+badge+'</div><div class="pin-tail"></div></div>',
    iconSize:[34,43],iconAnchor:[17,43],popupAnchor:[0,-47]});
}

function toggleMenu(){
  menuOpen=!menuOpen;
  document.getElementById('slideMenu').classList.toggle('open',menuOpen);
  document.getElementById('menuOverlay').classList.toggle('show',menuOpen);
  document.getElementById('menuTrigger').classList.toggle('open',menuOpen);
}
function closeMenu(){
  menuOpen=false;
  document.getElementById('slideMenu').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('show');
  document.getElementById('menuTrigger').classList.remove('open');
}

function renderMenu(spots){
  const works={};
  spots.forEach(s=>{if(!works[s.work])works[s.work]={spots:[],emoji:s.emoji||'📍'};works[s.work].spots.push(s);});
  const tp=spots.reduce((a,s)=>a+(s.count||0),0);
  document.getElementById('menuStatSpots').textContent=spots.length;
  document.getElementById('menuStatWorks').textContent=Object.keys(works).length;
  document.getElementById('menuStatPhotos').textContent=tp>=1000?(tp/1000).toFixed(1)+'k':tp;
  document.getElementById('menuBody').innerHTML=Object.entries(works).map(([work,data])=>
    '<div class="work-section">'+
    '<div class="work-header" onclick="toggleWork(this)">'+
    '<div class="work-header-left"><div class="work-emoji">'+data.spots[0].emoji+'</div><div class="work-name">'+work+'</div></div>'+
    '<div style="display:flex;align-items:center;gap:8px"><div class="work-count">'+data.spots.length+'</div><div class="work-chevron">▼</div></div>'+
    '</div><div class="work-spots">'+
    data.spots.map(s=>'<div class="menu-spot-item'+(currentSpot&&currentSpot.id===s.id?' active':'')+'\" id="mi-'+s.id+'" onclick="selectSpot(\''+s.id+'\');closeMenu()">'+
    '<div class="menu-spot-dot" style="background:'+(tagColors[s.tag]||'#888')+'"></div>'+
    '<div style="flex:1;min-width:0"><div class="menu-spot-name">'+s.title+'</div><div class="menu-spot-loc">📍 '+(s.location||'—')+'</div></div>'+
    '<div class="menu-spot-photos">📸'+(s.count||0).toLocaleString()+'</div></div>').join('')+
    '</div></div>'
  ).join('');
}

function toggleWork(el){el.closest('.work-section').classList.toggle('open');}

function menuSearch(q){
  const query=q.trim().toLowerCase();
  const res=!query?allSpots:allSpots.filter(s=>s.title.toLowerCase().includes(query)||s.work.toLowerCase().includes(query)||(s.location||'').toLowerCase().includes(query));
  renderMenu(res);
  if(query)document.querySelectorAll('.work-section').forEach(ws=>ws.classList.add('open'));
}

function renderMarkers(spots){
  Object.values(markers).forEach(m=>map.removeLayer(m));markers={};
  spots.forEach(s=>{
    const _q=encodeURIComponent((s.work||'')+(s.title?' '+s.title:'')+(s.location?' '+s.location:'')+'　聖地巡礼');
    const _imgUrl='https://www.google.com/search?q='+_q+'&tbm=isch';
    const m=L.marker([s.lat,s.lng],{icon:makeIcon(s.emoji,s.tag,s.status)}).addTo(map)
      .bindPopup('<div class="popup-body">'+(s.anime_img?'<img class="popup-thumb" src="'+s.anime_img+'" onerror="this.style.display=\'none\'">':'')+'<div class="popup-title">'+s.title+'</div><div class="popup-work">'+s.work+'</div><div class="popup-meta"><span class="popup-tag">📍 '+(s.location||'—')+'</span><span class="popup-tag">📸 '+(s.count||0).toLocaleString()+'</span>'+(s.diff?'<span class="popup-tag">'+s.diff+'</span>':'')+'</div><a class="popup-cta" href="'+_imgUrl+'" target="_blank" rel="noopener" style="display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;color:#fff;font-family:\'Yomogi\',cursive;">🔍 画像検索で見る</a></div>',{maxWidth:230})
      .on('click',()=>selectSpot(s.id));
    markers[s.id]=m;
  });
  document.getElementById('countNum').textContent=spots.length;
  document.getElementById('drawerNum').textContent=spots.length;
}

function renderDrawerList(spots){
  document.getElementById('drawerList').innerHTML=spots.length?spots.map((s,i)=>
    '<div class="spot-row'+(currentSpot&&currentSpot.id===s.id?' active':'')+'\" id="dr-'+s.id+'" onclick="selectSpot(\''+s.id+'\')">'+
    '<div class="spot-row-idx">'+String(i+1).padStart(2,'0')+'</div>'+
    '<div class="spot-row-icon">'+(s.emoji||'📍')+'</div>'+
    '<div class="spot-row-body"><div class="spot-row-title">'+s.title+'</div><div class="spot-row-work">'+s.work+'</div><div class="spot-row-loc">📍 '+(s.location||'—')+'</div></div>'+
    '<div class="spot-row-count">📸'+(s.count||0).toLocaleString()+'</div></div>'
  ).join(''):'<div style="padding:20px;text-align:center;font-size:11px;color:#aaa;">No results</div>';
}

function selectSpot(id){
  const s=allSpots.find(x=>x.id===id);if(!s)return;
  currentSpot=s;
  document.querySelectorAll('.spot-row,.menu-spot-item').forEach(el=>el.classList.remove('active'));
  ['dr-'+id,'mi-'+id].forEach(sid=>{const el=document.getElementById(sid);if(el){el.classList.add('active');el.scrollIntoView({behavior:'smooth',block:'nearest'});}});
  map.flyTo([s.lat,s.lng],15,{duration:0.9});
  if(markers[id])markers[id].openPopup();
  const tagHtml=[s.location&&'<span class="detail-tag">📍 '+s.location+'</span>',s.count&&'<span class="detail-tag">📸 '+s.count.toLocaleString()+'</span>',s.diff&&'<span class="detail-tag">'+s.diff+'</span>',s.ep&&'<span class="detail-tag">'+s.ep+'</span>'].filter(Boolean).join('');
  const dAnimeImg=document.getElementById('detailAnimeImg');
  const dAnimeEmoji=document.getElementById('detailEmoji');
  if(s.anime_img){dAnimeImg.src=s.anime_img;dAnimeImg.style.display='block';dAnimeEmoji.style.display='none';}
  else{dAnimeImg.style.display='none';dAnimeEmoji.style.display='flex';}
  dAnimeEmoji.textContent=s.emoji||'📍';
  const dRealImg=document.getElementById('detailRealImg');
  const dRealEmoji=document.getElementById('detailRealEmoji');
  if(s.real_img){dRealImg.src=s.real_img;dRealImg.style.display='block';dRealEmoji.style.display='none';}
  else{dRealImg.style.display='none';dRealEmoji.style.display='flex';}
  document.getElementById('detailTitle').textContent=s.title;
  document.getElementById('detailWork').textContent=s.work+(s.ep?' — '+s.ep:'');
  document.getElementById('detailTags').innerHTML=tagHtml;
  document.getElementById('detailPanel').classList.add('show');
  document.getElementById('sheetEmoji').textContent=s.emoji||'📍';
  const sImgs=document.getElementById('sheetImgs');
  const sAnimeImg=document.getElementById('sheetAnimeImg');
  const sRealImg=document.getElementById('sheetRealImg');
  if(s.anime_img||s.real_img){
    sImgs.classList.add('show');
    if(s.anime_img){sAnimeImg.src=s.anime_img;sAnimeImg.parentElement.style.display='block';}
    else{sAnimeImg.parentElement.style.display='none';}
    if(s.real_img){sRealImg.src=s.real_img;sRealImg.parentElement.style.display='block';}
    else{sRealImg.parentElement.style.display='none';}
  }else{sImgs.classList.remove('show');}
  document.getElementById('sheetTitle').textContent=s.title;
  document.getElementById('sheetWork').textContent=s.work+(s.ep?' — '+s.ep:'');
  document.getElementById('sheetTags').innerHTML=tagHtml.replace(/detail-tag/g,'sheet-tag');
  document.getElementById('mobileSheet').classList.add('show');
  document.getElementById('spotDrawer').classList.remove('expanded');
  drawerOpen=false;
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('show');
  document.getElementById('mobileSheet').classList.remove('show');
  document.querySelectorAll('.spot-row,.menu-spot-item').forEach(el=>el.classList.remove('active'));
  currentSpot=null;
}
function openNavi(){if(!currentSpot)return;window.open('https://www.google.com/maps/search/?api=1&query='+currentSpot.lat+','+currentSpot.lng,'_blank');}
function toggleDrawer(){drawerOpen=!drawerOpen;document.getElementById('spotDrawer').classList.toggle('expanded',drawerOpen);if(drawerOpen)closeDetail();}
function searchSpots(q){const query=q.trim().toLowerCase();filteredSpots=!query?[...allSpots]:allSpots.filter(s=>s.title.toLowerCase().includes(query)||s.work.toLowerCase().includes(query)||(s.location||'').toLowerCase().includes(query));renderMarkers(filteredSpots);renderDrawerList(filteredSpots);renderMenu(filteredSpots);}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

map.on('click',e=>{if(!e.originalEvent.target.closest('.pin-wrap'))closeDetail();});

// Boot
function hideSplash(){
  const s=document.getElementById('loading');
  s.style.transition='opacity 0.5s';s.style.opacity='0';
  setTimeout(()=>s.classList.add('hide'),500);
}
function showError(msg){
  hideSplash();
  setTimeout(()=>{
    document.getElementById('errorScreen').classList.remove('hide');
    document.getElementById('errorMsg').textContent=msg;
  },1500);
}

setTimeout(async()=>{
  try{
    document.getElementById('splashSub').textContent='Connecting...';
    const res=await fetch(SUPABASE_URL+'/rest/v1/spots?select=*&order=count.desc',{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    allSpots=await res.json();
    if(!Array.isArray(allSpots)||allSpots.length===0)throw new Error('データが空です');
    filteredSpots=[...allSpots];
    renderMarkers(filteredSpots);
    renderDrawerList(filteredSpots);
    renderMenu(allSpots);

    // 登録後のズームイン（?zLat=&zLng= が付いている場合）
    const _p = new URLSearchParams(location.search);
    const _zLat = parseFloat(_p.get('zLat'));
    const _zLng = parseFloat(_p.get('zLng'));
    if (_zLat && _zLng) {
      // まず全体を表示してからズームイン
      map.fitBounds(L.latLngBounds(allSpots.map(s=>[s.lat,s.lng])),{padding:[60,80]});
      hideSplash();
      setTimeout(()=>{
        map.flyTo([_zLat, _zLng], 16, {duration:2.2});
        // ピンのポップアップを開く
        setTimeout(()=>{
          const target = allSpots.find(s=>Math.abs(s.lat-_zLat)<0.0002&&Math.abs(s.lng-_zLng)<0.0002);
          if(target && markers[target.id]) markers[target.id].openPopup();
        }, 2400);
      }, 800);
    } else {
      map.flyToBounds(L.latLngBounds(allSpots.map(s=>[s.lat,s.lng])),{padding:[60,80],duration:1.4});
      hideSplash();
    }
    setTimeout(()=>showToast('✓ '+allSpots.length+'件の聖地を発見！'),600);
  }catch(e){
    console.error(e);
    showError(e.message);
  }
},1500);
</script>

</body>
</html>
