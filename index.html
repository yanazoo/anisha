<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>アニしゃ / AniFrame</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700;900&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --white: #ffffff;
  --black: #0a0a0a;
  --gray: #888;
  --light: #f2f2f2;
  --border: #e0e0e0;
  --accent: #ff2d2d;
  --text: #0a0a0a;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
height:100%; height:100dvh;
background:var(–white);
color:var(–black);
font-family:‘Noto Sans JP’, sans-serif;
overflow:hidden;
}

/* ── HEADER ── */
header {
position:fixed; top:0; left:0; right:0; z-index:200;
background:var(–white);
border-bottom:1px solid var(–border);
padding:0 20px;
}

.header-row1 {
display:flex; align-items:center; justify-content:space-between;
height:52px;
}

.logo {
display:flex; align-items:baseline; gap:10px;
}

.logo-ja {
font-family:‘Bebas Neue’, sans-serif;
font-size:28px; letter-spacing:.06em;
color:var(–black); line-height:1;
}

.logo-slash {
color:var(–border); font-size:20px;
}

.logo-en {
font-family:‘Space Mono’, monospace;
font-size:10px; color:var(–gray);
letter-spacing:.12em; text-transform:uppercase;
}

.header-right {
display:flex; align-items:center; gap:10px;
}

.h-btn {
height:34px; padding:0 16px;
border-radius:0;
font-family:‘Noto Sans JP’, sans-serif;
font-size:11px; font-weight:700;
letter-spacing:.06em;
cursor:pointer; border:1px solid var(–black);
background:transparent; color:var(–black);
transition:all .15s;
}
.h-btn:hover { background:var(–black); color:var(–white); }
.h-btn:active { transform:scale(0.97); }
.h-btn.fill { background:var(–black); color:var(–white); }
.h-btn.fill:hover { background:#333; }

/* Filter row */
.filter-row {
display:flex; gap:0;
overflow-x:auto; height:38px; align-items:center;
border-top:1px solid var(–border);
scrollbar-width:none;
}
.filter-row::-webkit-scrollbar { display:none; }

.f-btn {
height:100%; padding:0 16px;
font-family:‘Space Mono’, monospace;
font-size:10px; letter-spacing:.08em; text-transform:uppercase;
color:var(–gray); background:transparent; border:none;
border-right:1px solid var(–border);
cursor:pointer; white-space:nowrap; transition:all .15s;
flex-shrink:0;
}
.f-btn:hover { background:var(–light); color:var(–black); }
.f-btn.active { background:var(–black); color:var(–white); }

/* ── LAYOUT ── */
.layout {
display:flex;
position:fixed;
top:90px; /* header height */
left:0; right:0; bottom:0;
}

/* ── MAP ── */
.map-area {
flex:1; position:relative; overflow:hidden;
}

#map { width:100%; height:100%; }

/* Light map style */
.leaflet-tile {
filter: saturate(0.2) brightness(1.05);
}
.leaflet-container { background:var(–light); }

.leaflet-control-zoom a {
background:var(–white) !important;
color:var(–black) !important;
border-color:var(–border) !important;
border-radius:0 !important;
font-family:‘Space Mono’,monospace !important;
}

/* Custom pin */
.pin-outer {
display:flex; flex-direction:column; align-items:center;
cursor:pointer;
}
.pin-circle {
width:32px; height:32px; border-radius:50%;
display:flex; align-items:center; justify-content:center;
font-size:14px; border:2px solid var(–white);
box-shadow:0 2px 8px rgba(0,0,0,0.2);
transition:transform .15s;
}
.pin-line {
width:1px; height:8px; background:rgba(0,0,0,0.3);
}

/* Map overlays */
.map-count {
position:absolute; top:16px; left:16px; z-index:400;
background:var(–white); border:1px solid var(–border);
padding:10px 14px;
}
.map-count-num {
font-family:‘Bebas Neue’, sans-serif;
font-size:32px; line-height:1; color:var(–black);
}
.map-count-label {
font-family:‘Space Mono’, monospace;
font-size:9px; color:var(–gray); letter-spacing:.08em; text-transform:uppercase;
margin-top:2px;
}

.map-search {
position:absolute; top:16px; left:50%; transform:translateX(-50%);
z-index:400; width:260px;
}
.map-search input {
width:100%; height:40px; padding:0 14px;
background:var(–white); border:1px solid var(–border);
border-radius:0; color:var(–black);
font-family:‘Noto Sans JP’, sans-serif; font-size:12px;
outline:none; transition:border-color .15s;
}
.map-search input:focus { border-color:var(–black); }
.map-search input::placeholder { color:#bbb; }

/* ── SIDEBAR ── */
.sidebar {
width:340px; flex-shrink:0;
border-left:1px solid var(–border);
background:var(–white);
display:flex; flex-direction:column;
overflow:hidden;
}

.sidebar-head {
padding:16px 20px;
border-bottom:1px solid var(–border);
flex-shrink:0;
}

.sidebar-label {
font-family:‘Space Mono’, monospace;
font-size:10px; color:var(–gray); letter-spacing:.1em;
text-transform:uppercase; margin-bottom:10px;
}

.sidebar-search {
width:100%; height:36px; padding:0 12px;
border:1px solid var(–border); background:var(–white);
color:var(–black); font-family:‘Noto Sans JP’, sans-serif;
font-size:12px; outline:none; border-radius:0;
transition:border-color .15s;
}
.sidebar-search:focus { border-color:var(–black); }
.sidebar-search::placeholder { color:#bbb; }

.spot-list {
flex:1; overflow-y:auto;
}
.spot-list::-webkit-scrollbar { width:3px; }
.spot-list::-webkit-scrollbar-thumb { background:var(–border); }

.spot-row {
display:flex; align-items:center;
padding:14px 20px;
border-bottom:1px solid var(–border);
cursor:pointer; transition:background .1s;
gap:14px;
}
.spot-row:hover { background:var(–light); }
.spot-row.active { background:var(–black); }
.spot-row.active .spot-row-title,
.spot-row.active .spot-row-work,
.spot-row.active .spot-row-loc,
.spot-row.active .spot-row-count { color:var(–white) !important; }

.spot-row-num {
font-family:‘Space Mono’, monospace;
font-size:11px; color:var(–border);
width:24px; flex-shrink:0; text-align:right;
}
.spot-row.active .spot-row-num { color:rgba(255,255,255,0.3); }

.spot-row-emoji {
width:36px; height:36px; flex-shrink:0;
display:flex; align-items:center; justify-content:center;
font-size:18px; background:var(–light); border:1px solid var(–border);
}
.spot-row.active .spot-row-emoji { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2); }

.spot-row-body { flex:1; min-width:0; }
.spot-row-title {
font-size:13px; font-weight:700; margin-bottom:2px;
white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.spot-row-work { font-size:11px; color:var(–gray); margin-bottom:1px; }
.spot-row-loc { font-size:10px; color:#bbb; }

.spot-row-count {
font-family:‘Space Mono’, monospace;
font-size:10px; color:var(–gray); flex-shrink:0; text-align:right;
}

/* ── DETAIL PANEL ── */
.detail-panel {
position:absolute; bottom:0; left:0;
width:calc(100% - 340px);
background:var(–white); border-top:1px solid var(–border);
z-index:300;
transform:translateY(100%);
transition:transform .3s cubic-bezier(0.4,0,0.2,1);
}
.detail-panel.show { transform:translateY(0); }

.detail-inner {
display:flex; align-items:stretch; gap:0;
}

.detail-compare {
display:flex; flex-shrink:0; border-right:1px solid var(–border);
}
.detail-half {
width:90px; height:80px;
display:flex; flex-direction:column; align-items:center; justify-content:center;
gap:4px; border-right:1px solid var(–border);
}
.detail-half:last-child { border-right:none; }
.detail-half-emoji { font-size:24px; }
.detail-half-label {
font-family:‘Space Mono’, monospace;
font-size:8px; color:var(–gray); letter-spacing:.1em; text-transform:uppercase;
}

.detail-body {
flex:1; padding:16px 20px; display:flex; align-items:center; gap:20px;
}
.detail-text { flex:1; }
.detail-title {
font-family:‘Bebas Neue’, sans-serif;
font-size:22px; letter-spacing:.04em; line-height:1; margin-bottom:4px;
}
.detail-work { font-size:11px; color:var(–gray); margin-bottom:6px; }
.detail-tags { display:flex; gap:6px; flex-wrap:wrap; }
.detail-tag {
font-family:‘Space Mono’, monospace;
font-size:9px; color:var(–gray);
border:1px solid var(–border); padding:2px 8px;
letter-spacing:.06em;
}

.detail-actions { display:flex; gap:8px; align-items:center; flex-shrink:0; }
.d-btn {
height:36px; padding:0 18px;
font-family:‘Noto Sans JP’, sans-serif;
font-size:11px; font-weight:700; letter-spacing:.04em;
cursor:pointer; border:1px solid var(–black);
background:transparent; color:var(–black); transition:all .15s;
}
.d-btn:hover { background:var(–black); color:var(–white); }
.d-btn:active { transform:scale(0.97); }
.d-btn.fill { background:var(–black); color:var(–white); }
.d-btn.fill:hover { background:#333; }
.d-btn.close { border-color:var(–border); color:var(–gray); }
.d-btn.close:hover { background:var(–light); color:var(–black); }

/* ── MOBILE BOTTOM SHEET ── */
.mobile-sheet {
display:none;
position:fixed; bottom:0; left:0; right:0; z-index:500;
background:var(–white); border-top:2px solid var(–black);
transform:translateY(100%);
transition:transform .3s cubic-bezier(0.4,0,0.2,1);
}
.mobile-sheet.show { transform:translateY(0); }

.sheet-drag { height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.sheet-drag-bar { width:32px; height:3px; background:var(–border); }

.sheet-body { padding:0 20px 24px; }
.sheet-title {
font-family:‘Bebas Neue’, sans-serif;
font-size:28px; letter-spacing:.04em; margin-bottom:2px;
}
.sheet-work { font-size:12px; color:var(–gray); margin-bottom:10px; }
.sheet-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.sheet-tag {
font-family:‘Space Mono’, monospace;
font-size:9px; color:var(–gray);
border:1px solid var(–border); padding:3px 10px;
}
.sheet-btns { display:flex; gap:8px; }
.sheet-btns .d-btn { flex:1; height:44px; }

/* Mobile list drawer */
.mobile-drawer {
display:none;
position:fixed; bottom:0; left:0; right:0; z-index:400;
background:var(–white); border-top:1px solid var(–border);
transform:translateY(calc(100% - 48px));
transition:transform .3s cubic-bezier(0.4,0,0.2,1);
max-height:70vh; flex-direction:column;
}
.mobile-drawer.expanded { transform:translateY(0); }
.mobile-drawer.hidden { transform:translateY(100%); }

.drawer-top {
height:48px; border-bottom:1px solid var(–border);
display:flex; align-items:center; justify-content:space-between;
padding:0 20px; cursor:pointer; flex-shrink:0;
}
.drawer-top-label {
font-family:‘Space Mono’, monospace;
font-size:10px; letter-spacing:.08em; color:var(–gray);
text-transform:uppercase; display:flex; align-items:center; gap:8px;
}
.drawer-top-count {
font-family:‘Bebas Neue’, sans-serif;
font-size:18px; color:var(–black);
}
.drawer-chevron { font-size:12px; color:var(–gray); transition:transform .3s; }
.mobile-drawer.expanded .drawer-chevron { transform:rotate(180deg); }

.drawer-scroll {
overflow-y:auto; flex:1;
-webkit-overflow-scrolling:touch;
}
.drawer-scroll::-webkit-scrollbar { display:none; }

/* Loading */
.loading {
position:fixed; inset:0; z-index:1000;
background:var(–white);
display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.loading.hide { display:none; }
.loading-title {
font-family:‘Bebas Neue’, sans-serif;
font-size:48px; letter-spacing:.06em; color:var(–black);
}
.loading-bar {
width:200px; height:2px; background:var(–border); overflow:hidden;
}
.loading-progress {
height:100%; background:var(–black);
width:0%; transition:width .1s linear;
animation:loadBar 1.8s ease-in-out infinite;
}
@keyframes loadBar {
0% { width:0%; margin-left:0; }
50% { width:60%; }
100% { width:0%; margin-left:100%; }
}
.loading-sub {
font-family:‘Space Mono’, monospace;
font-size:10px; color:var(–gray); letter-spacing:.1em; text-transform:uppercase;
}

/* Error */
.error-screen {
position:fixed; inset:0; z-index:1000;
background:var(–white);
display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
.error-screen.hide { display:none; }
.error-title {
font-family:‘Bebas Neue’, sans-serif; font-size:40px; color:var(–accent);
}
.error-msg { font-size:12px; color:var(–gray); text-align:center; max-width:280px; line-height:1.7; }
.retry-btn {
height:40px; padding:0 28px;
background:var(–black); color:var(–white);
border:none; font-family:‘Noto Sans JP’, sans-serif;
font-size:12px; font-weight:700; cursor:pointer;
}

/* Popup */
.leaflet-popup-content-wrapper {
background:var(–white) !important;
border:1px solid var(–border) !important;
border-radius:0 !important;
box-shadow:0 4px 20px rgba(0,0,0,0.12) !important;
color:var(–black) !important;
padding:0 !important;
}
.leaflet-popup-content { margin:0 !important; }
.leaflet-popup-tip { background:var(–white) !important; }
.leaflet-popup-close-button { color:var(–gray) !important; padding:8px !important; }

.popup-body { padding:16px 18px; min-width:180px; }
.popup-title { font-family:‘Bebas Neue’,sans-serif; font-size:18px; letter-spacing:.04em; margin-bottom:2px; }
.popup-work { font-size:11px; color:var(–gray); margin-bottom:4px; }
.popup-loc { font-size:10px; color:#bbb; margin-bottom:12px; font-family:‘Space Mono’,monospace; }
.popup-cta {
width:100%; height:34px; border:1px solid var(–black);
background:var(–black); color:var(–white);
font-family:‘Noto Sans JP’, sans-serif; font-size:11px; font-weight:700;
cursor:pointer; letter-spacing:.04em;
}

/* Toast */
.toast {
position:fixed; bottom:24px; left:50%;
transform:translateX(-50%) translateY(60px);
background:var(–black); color:var(–white);
padding:10px 20px; font-size:12px; font-weight:700;
letter-spacing:.04em; transition:transform .25s ease; z-index:2000;
white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 768px) {
.sidebar { display:none; }
.detail-panel { display:none; }
.mobile-sheet { display:block; }
.mobile-drawer { display:flex; }
.layout { top:90px; }
.map-search { width:calc(100% - 140px); }
.map-count { display:none; }
}
</style>

</head>

<script>
const SUPABASE_URL = 'https://zzpfnszijxkfxtietilr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6cGZuc3ppanhrZnh0aWV0aWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTI2MzMsImV4cCI6MjA5MDU4ODYzM30.gqVLopJ3kveG1YwAcF6LQ7GFS2tZ0VRlHAG7M4je2Z0';

async function fetchSpots() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/spots?select=*&order=count.desc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

// Map
const map = L.map('map', { center:[36.5,137.5], zoom:6, zoomControl:false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap', maxZoom:19
}).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

const tagColors = { kimi:'#e8334a', slam:'#00b894', tenki:'#6c35de', other:'#f0a000' };

let allSpots=[], filteredSpots=[], markers={}, currentSpot=null, currentFilter='all', drawerOpen=false;

function makeIcon(emoji, tag) {
  const c = tagColors[tag] || '#888';
  return L.divIcon({
    className:'',
    html:`<div class="pin-outer">
      <div class="pin-circle" style="background:${c}">
        <span style="font-size:13px">${emoji||'📍'}</span>
      </div>
      <div class="pin-line"></div>
    </div>`,
    iconSize:[32,42], iconAnchor:[16,42], popupAnchor:[0,-46],
  });
}

function renderMarkers(spots) {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  spots.forEach((s,i) => {
    const m = L.marker([s.lat,s.lng], { icon: makeIcon(s.emoji, s.tag) })
      .addTo(map)
      .bindPopup(`<div class="popup-body">
        <div class="popup-title">${s.title}</div>
        <div class="popup-work">${s.work}</div>
        <div class="popup-loc">${s.location||'—'} · ${(s.count||0).toLocaleString()} photos</div>
        <button class="popup-cta" onclick="selectSpot('${s.id}')">View Details →</button>
      </div>`, { maxWidth:220 })
      .on('click', () => selectSpot(s.id));
    markers[s.id] = m;
  });
  document.getElementById('countNum').textContent = spots.length;
  document.getElementById('drawerCount').textContent = spots.length;
}

function renderList(spots) {
  const html = spots.map((s,i) => `
    <div class="spot-row ${currentSpot?.id===s.id?'active':''}" id="sr-${s.id}" onclick="selectSpot('${s.id}')">
      <div class="spot-row-num">${String(i+1).padStart(2,'0')}</div>
      <div class="spot-row-emoji">${s.emoji||'📍'}</div>
      <div class="spot-row-body">
        <div class="spot-row-title">${s.title}</div>
        <div class="spot-row-work">${s.work}</div>
        <div class="spot-row-loc">${s.location||'—'}</div>
      </div>
      <div class="spot-row-count">${(s.count||0).toLocaleString()}<br><span style="font-size:8px">photos</span></div>
    </div>
  `).join('');
  const empty = '<div style="padding:24px;text-align:center;font-size:12px;color:#bbb;font-family:Space Mono,monospace">No results</div>';
  document.getElementById('spotList').innerHTML = spots.length ? html : empty;
  document.getElementById('drawerScroll').innerHTML = spots.length ? html : empty;
}

function selectSpot(id) {
  const s = allSpots.find(x => x.id === id);
  if (!s) return;
  currentSpot = s;

  document.querySelectorAll('.spot-row').forEach(el => el.classList.remove('active'));
  ['sr-'+id].forEach(sid => {
    const el = document.getElementById(sid);
    if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  });

  map.flyTo([s.lat, s.lng], 15, { duration:0.9 });
  if (markers[id]) markers[id].openPopup();

  // Desktop detail
  document.getElementById('detailEmoji').textContent = s.emoji||'📍';
  document.getElementById('detailTitle').textContent = s.title;
  document.getElementById('detailWork').textContent = `${s.work}${s.ep?' — '+s.ep:''}`;
  const tags = [
    s.location?`${s.location}`:'',
    s.count?`${s.count.toLocaleString()} photos`:'',
    s.diff||'',
  ].filter(Boolean).map(t=>`<span class="detail-tag">${t}</span>`).join('');
  document.getElementById('detailTags').innerHTML = tags;
  document.getElementById('detailPanel').classList.add('show');

  // Mobile sheet
  document.getElementById('sheetTitle').textContent = s.title;
  document.getElementById('sheetWork').textContent = `${s.work}${s.ep?' — '+s.ep:''}`;
  document.getElementById('sheetTags').innerHTML = tags.replace(/detail-tag/g,'sheet-tag');
  document.getElementById('mobileSheet').classList.add('show');
  document.getElementById('mobileDrawer').classList.remove('expanded');
  drawerOpen = false;
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('show');
  document.getElementById('mobileSheet').classList.remove('show');
  document.querySelectorAll('.spot-row').forEach(el => el.classList.remove('active'));
  currentSpot = null;
}

function openNavi() {
  if (!currentSpot) return;
  window.open(`https://www.google.com/maps/search/?api=1&query=${currentSpot.lat},${currentSpot.lng}`, '_blank');
}

function toggleDrawer() {
  drawerOpen = !drawerOpen;
  const d = document.getElementById('mobileDrawer');
  if (drawerOpen) { d.classList.add('expanded'); closeDetail(); }
  else d.classList.remove('expanded');
}

function filterSpots(tag, el) {
  currentFilter = tag;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  filteredSpots = tag==='all' ? [...allSpots] : allSpots.filter(s => s.tag===tag);
  renderMarkers(filteredSpots);
  renderList(filteredSpots);
  closeDetail();
  if (filteredSpots.length>0)
    map.flyToBounds(L.latLngBounds(filteredSpots.map(s=>[s.lat,s.lng])), {padding:[60,80],duration:1.1});
}

function searchSpots(q) {
  const query = q.trim().toLowerCase();
  const base = currentFilter==='all' ? allSpots : allSpots.filter(s=>s.tag===currentFilter);
  const res = !query ? base : base.filter(s =>
    s.title.toLowerCase().includes(query) ||
    s.work.toLowerCase().includes(query) ||
    (s.location||'').toLowerCase().includes(query)
  );
  renderMarkers(res);
  renderList(res);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

map.on('click', e => {
  if (!e.originalEvent.target.closest('.pin-outer')) closeDetail();
});

(async()=>{
  try {
    allSpots = await fetchSpots();
    filteredSpots = [...allSpots];
    renderMarkers(filteredSpots);
    renderList(filteredSpots);
    if (allSpots.length>0)
      map.flyToBounds(L.latLngBounds(allSpots.map(s=>[s.lat,s.lng])), {padding:[60,80],duration:1.4});
    document.getElementById('loading').classList.add('hide');
    showToast(`${allSpots.length} sacred sites loaded`);
  } catch(e) {
    document.getElementById('loading').classList.add('hide');
    document.getElementById('errorScreen').classList.remove('hide');
    document.getElementById('errorMsg').textContent = e.message;
  }
})();
</script>

</body>
</html>
