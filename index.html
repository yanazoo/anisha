<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>アニしゃ / AniFrame</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Yomogi&family=Kosugi+Maru&family=Noto+Sans+JP:wght@300;400;700;900&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --white: #ffffff;
  --black: #0d0d0d;
  --gray: #888;
  --light: #f4f6f8;
  --border: #e2e6ea;
  --sky: #e8f4fd;
  --sky2: #d0eaf8;
  --sky3: #b8dff5;
  --sky-dark: #4a9cc7;
  --accent: #1a7fc1;
  --text: #0d0d0d;
  --muted: #666;
  --glass: rgba(232,244,253,0.82);
  --glass-border: rgba(74,156,199,0.25);
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; height:100dvh; background:var(–white); color:var(–black); font-family:‘Yomogi’,cursive; overflow:hidden; }

/* ── HEADER ── */
header {
position:fixed; top:0; left:0; right:0; z-index:300;
background:rgba(255,255,255,0.96);
backdrop-filter:blur(16px);
border-bottom:1px solid var(–border);
height:52px;
display:flex; align-items:center; padding:0 16px; gap:12px;
}

.menu-trigger {
width:44px; height:44px; flex-shrink:0;
display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px;
cursor:pointer; border:none; background:transparent; box-shadow:none;
border-radius:8px; transition:all .2s;
}
.menu-trigger:hover { background:var(–sky2); border-color:var(–sky-dark); }
.menu-trigger:active { transform:scale(0.95); }
.hamburger-line {
width:22px; height:2px; background:#aaaaaa; border-radius:2px; display:block;
transition:all .3s;
}
.menu-trigger.open .hamburger-line:nth-child(1) { transform:rotate(45deg) translate(4.5px,4.5px); }
.menu-trigger.open .hamburger-line:nth-child(2) { opacity:0; }
.menu-trigger.open .hamburger-line:nth-child(3) { transform:rotate(-45deg) translate(4.5px,-4.5px); }

.logo {
display:flex; align-items:baseline; gap:8px; flex-shrink:0;
}
.logo-ja { font-family:‘Yomogi’,cursive; font-size:26px; letter-spacing:.06em; line-height:1; }
.logo-slash { color:var(–border); font-size:18px; }
.logo-en { font-family:‘Yomogi’,cursive; font-size:9px; color:var(–sky-dark); letter-spacing:.12em; }

.header-search {
flex:1; max-width:320px;
height:34px; padding:0 12px;
background:var(–sky); border:1px solid var(–glass-border);
border-radius:6px; color:var(–black);
font-family:‘Yomogi’,cursive; font-size:12px;
outline:none; transition:all .2s;
}
.header-search:focus { background:var(–white); border-color:var(–sky-dark); box-shadow:0 0 0 3px rgba(74,156,199,0.12); }
.header-search::placeholder { color:#aac4d8; }

.header-right { margin-left:auto; display:flex; gap:8px; }
.h-btn {
height:34px; padding:0 14px; border-radius:6px;
font-family:‘Yomogi’,cursive; font-size:11px; font-weight:700;
cursor:pointer; border:1px solid var(–border);
background:var(–sky); color:var(–black); transition:all .2s;
}
.h-btn:hover { background:var(–sky2); border-color:var(–sky-dark); }
.h-btn:active { transform:scale(0.96); }
.h-btn.fill { background:var(–accent); border-color:var(–accent); color:var(–white); }
.h-btn.fill:hover { background:#1568a0; }

/* ── SLIDE MENU ── */
.menu-overlay {
position:fixed; inset:0; z-index:400;
background:rgba(13,13,13,0.3);
backdrop-filter:blur(2px);
opacity:0; pointer-events:none;
transition:opacity .3s;
}
.menu-overlay.show { opacity:1; pointer-events:all; }

.slide-menu {
position:fixed; top:0; left:0; bottom:0; z-index:500;
width:300px;
background:var(–white);
border-right:1px solid var(–border);
transform:translateX(-100%);
transition:transform .35s cubic-bezier(0.4,0,0.2,1);
display:flex; flex-direction:column;
overflow:hidden;
}
.slide-menu.open { transform:translateX(0); }

.menu-header {
padding:16px 20px;
border-bottom:1px solid var(–border);
background:var(–sky);
flex-shrink:0;
}
.menu-header-top {
display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
}
.menu-title { font-family:‘Yomogi’,cursive; font-size:22px; letter-spacing:.06em; color:var(–black); }
.menu-close {
width:30px; height:30px; border-radius:6px;
border:1px solid var(–glass-border); background:var(–white);
display:flex; align-items:center; justify-content:center;
font-size:14px; cursor:pointer; color:var(–muted); transition:all .15s;
}
.menu-close:hover { background:var(–sky2); }

.menu-search {
width:100%; height:34px; padding:0 12px;
background:var(–white); border:1px solid var(–glass-border);
border-radius:6px; color:var(–black);
font-family:‘Yomogi’,cursive; font-size:12px; outline:none;
transition:border-color .2s;
}
.menu-search:focus { border-color:var(–sky-dark); }
.menu-search::placeholder { color:#aac4d8; }

.menu-stats {
display:flex; gap:12px; padding:12px 20px;
border-bottom:1px solid var(–border); flex-shrink:0;
}
.menu-stat {
flex:1; text-align:center; padding:8px;
background:var(–sky); border-radius:6px; border:1px solid var(–glass-border);
}
.menu-stat-num { font-family:‘Yomogi’,cursive; font-size:22px; color:var(–accent); line-height:1; }
.menu-stat-label { font-family:‘Yomogi’,cursive; font-size:9px; color:var(–muted); margin-top:2px; letter-spacing:.06em; }

/* Work sections */
.menu-body { flex:1; overflow-y:auto; }
.menu-body::-webkit-scrollbar { width:3px; }
.menu-body::-webkit-scrollbar-thumb { background:var(–sky3); }

.work-section { border-bottom:1px solid var(–border); }
.work-header-colors { display:none; }
.work-header {
display:flex; align-items:center; justify-content:space-between;
padding:12px 20px; cursor:pointer;
transition:background .15s; user-select:none;
}
.work-header:hover { background:var(–sky); }
.work-header-left { display:flex; align-items:center; gap:10px; }
.work-emoji { font-size:18px; }
.work-name { font-size:15px; font-weight:700; font-family:‘Yomogi’,cursive; color:var(–black); letter-spacing:.04em; }
font-family:‘Yomogi’,cursive; font-size:15px; color:var(–white); background:var(–accent); padding:2px 10px; border-radius:10px;

color:var(–white); background:var(–accent);
padding:2px 7px; border-radius:10px;
}
.work-chevron { font-size:10px; color:var(–muted); transition:transform .25s; }
.work-section.open .work-chevron { transform:rotate(180deg); }

.work-spots { display:none; }
.work-section.open .work-spots { display:block; }

.menu-spot-item {
display:flex; align-items:center; gap:10px;
padding:10px 20px 10px 48px;
cursor:pointer; transition:background .15s; border-top:1px solid var(–border);
}
.menu-spot-item:hover { background:var(–sky); }
.menu-spot-item.active { background:var(–sky2); }
.menu-spot-dot {
width:6px; height:6px; border-radius:50%; flex-shrink:0;
}
.menu-spot-name { font-size:12px; font-weight:700; flex:1; }
.menu-spot-loc { font-size:10px; color:var(–muted); }
.menu-spot-photos { font-family:‘Yomogi’,cursive; font-size:9px; color:var(–muted); flex-shrink:0; }

/* ── MAP ── */
.map-wrap {
position:fixed; top:52px; left:0; right:0; bottom:0; z-index:1;
}
#map { width:100%; height:100%; }
.leaflet-tile { filter:saturate(0.35) brightness(1.05); }
.leaflet-container { background:var(–light); }
.leaflet-control-zoom a {
background:rgba(255,255,255,0.95) !important;
color:var(–black) !important;
border-color:var(–border) !important;
border-radius:0 !important;
}

/* Pin */
.pin-wrap { display:flex; flex-direction:column; align-items:center; cursor:pointer; }
.pin-head {
width:34px; height:34px; border-radius:50%;
display:flex; align-items:center; justify-content:center; font-size:15px;
border:2.5px solid rgba(255,255,255,0.9);
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}
.pin-tail { width:2px; height:7px; background:rgba(0,0,0,0.25); }

/* Map count badge */
.map-badge {
position:absolute; top:14px; right:14px; z-index:200;
background:var(–glass); border:1px solid var(–glass-border);
backdrop-filter:blur(12px); padding:10px 14px; border-radius:8px;
}
.map-badge-num { font-family:‘Yomogi’,cursive; font-size:28px; line-height:1; color:var(–black); }
.map-badge-label { font-family:‘Yomogi’,cursive; font-size:9px; color:var(–sky-dark); letter-spacing:.08em; margin-top:2px; }

/* ── POPUP (Leaflet) ── */
.leaflet-popup-content-wrapper {
background:var(–glass) !important;
border:1px solid var(–glass-border) !important;
border-radius:12px !important;
box-shadow:0 8px 32px rgba(74,156,199,0.18) !important;
backdrop-filter:blur(16px) !important;
color:var(–black) !important;
padding:0 !important;
}
.leaflet-popup-content { margin:0 !important; }
.leaflet-popup-tip { background:var(–glass) !important; }
.leaflet-popup-close-button { color:var(–sky-dark) !important; padding:8px !important; font-size:16px !important; }

.popup-body { padding:16px 18px; min-width:190px; }
.popup-title { font-family:‘Yomogi’,cursive; font-size:20px; letter-spacing:.04em; color:var(–black); margin-bottom:3px; }
.popup-work { font-size:11px; font-weight:700; color:var(–accent); margin-bottom:4px; }
.popup-meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.popup-tag {
font-family:‘Yomogi’,cursive; font-size:9px;
color:var(–sky-dark); background:var(–sky);
border:1px solid var(–glass-border); padding:2px 8px; border-radius:4px;
}
.popup-cta {
width:100%; height:34px; border-radius:6px;
background:var(–accent); border:none; color:var(–white);
font-family:‘Yomogi’,cursive; font-size:11px; font-weight:700;
cursor:pointer; letter-spacing:.04em; transition:background .15s;
}
.popup-cta:hover { background:#1568a0; }

/* ── DETAIL PANEL (desktop bottom) ── */
.detail-panel {
position:absolute; bottom:0; left:0; right:0; z-index:200;
background:var(–glass);
border-top:1px solid var(–glass-border);
backdrop-filter:blur(20px);
transform:translateY(100%);
transition:transform .35s cubic-bezier(0.4,0,0.2,1);
box-shadow:0 -4px 24px rgba(74,156,199,0.12);
}
.detail-panel.show { transform:translateY(0); }

.detail-inner { display:flex; align-items:stretch; }

.detail-scenes {
display:flex; border-right:1px solid var(–glass-border); flex-shrink:0;
}
.scene-box {
width:88px; height:76px;
display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
border-right:1px solid var(–glass-border);
}
.scene-box:last-child { border-right:none; }
.scene-emoji { font-size:22px; }
.scene-label { font-family:‘Yomogi’,cursive; font-size:8px; color:var(–sky-dark); letter-spacing:.1em; text-transform:uppercase; }

.detail-body { flex:1; padding:14px 18px; display:flex; align-items:center; gap:16px; }
.detail-text { flex:1; min-width:0; }
.detail-title { font-family:‘Yomogi’,cursive; font-size:22px; letter-spacing:.04em; line-height:1; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.detail-work { font-size:11px; color:var(–accent); font-weight:700; margin-bottom:7px; }
.detail-tags { display:flex; gap:6px; flex-wrap:wrap; }
.detail-tag { font-family:‘Yomogi’,cursive; font-size:9px; color:var(–sky-dark); background:var(–sky); border:1px solid var(–glass-border); padding:2px 8px; border-radius:4px; }

.detail-actions { display:flex; gap:8px; flex-shrink:0; }
.d-btn {
height:36px; padding:0 16px; border-radius:6px;
font-family:‘Yomogi’,cursive; font-size:11px; font-weight:700;
cursor:pointer; transition:all .15s; border:1px solid var(–glass-border);
background:var(–sky); color:var(–black);
}
.d-btn:hover { background:var(–sky2); border-color:var(–sky-dark); }
.d-btn:active { transform:scale(0.96); }
.d-btn.fill { background:var(–accent); border-color:var(–accent); color:var(–white); }
.d-btn.fill:hover { background:#1568a0; }
.d-btn.close { color:var(–muted); }
.d-btn.close:hover { color:var(–black); }

/* ── MOBILE BOTTOM SHEET ── */
.mobile-sheet {
display:none;
position:fixed; bottom:0; left:0; right:0; z-index:350;
background:var(–glass);
border-top:1px solid var(–glass-border);
border-radius:16px 16px 0 0;
backdrop-filter:blur(20px);
box-shadow:0 -4px 32px rgba(74,156,199,0.18);
transform:translateY(100%);
transition:transform .35s cubic-bezier(0.4,0,0.2,1);
padding-bottom:env(safe-area-inset-bottom);
}
.mobile-sheet.show { transform:translateY(0); }

.sheet-drag { height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.sheet-drag-bar { width:32px; height:3px; background:var(–sky3); border-radius:2px; }

.sheet-body { padding:0 20px 20px; }
.sheet-emoji { font-size:32px; margin-bottom:6px; }
.sheet-title { font-family:‘Yomogi’,cursive; font-size:28px; letter-spacing:.04em; line-height:1; margin-bottom:3px; }
.sheet-work { font-size:12px; color:var(–accent); font-weight:700; margin-bottom:10px; }
.sheet-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.sheet-tag { font-family:‘Yomogi’,cursive; font-size:9px; color:var(–sky-dark); background:var(–sky); border:1px solid var(–glass-border); padding:3px 10px; border-radius:4px; }
.sheet-btns { display:flex; gap:8px; }
.sheet-btns .d-btn { flex:1; height:42px; }

/* ── MOBILE SPOT DRAWER ── */
.spot-drawer {
display:none;
position:fixed; bottom:0; left:0; right:0; z-index:300;
background:var(–glass);
border-top:1px solid var(–glass-border);
border-radius:16px 16px 0 0;
backdrop-filter:blur(20px);
max-height:65vh; flex-direction:column;
transform:translateY(calc(100% - 46px));
transition:transform .35s cubic-bezier(0.4,0,0.2,1);
}
.spot-drawer.expanded { transform:translateY(0); }
.spot-drawer.hidden { transform:translateY(100%); }

.drawer-peek {
height:46px; flex-shrink:0;
display:flex; align-items:center; justify-content:space-between;
padding:0 20px; cursor:pointer; border-bottom:1px solid var(–glass-border);
}
.drawer-peek-left { display:flex; align-items:center; gap:10px; }
.drawer-peek-num { font-family:‘Yomogi’,cursive; font-size:22px; color:var(–accent); line-height:1; }
.drawer-peek-label { font-family:‘Yomogi’,cursive; font-size:15px; color:var(–sky-dark); letter-spacing:.06em; }
.drawer-chevron { font-size:11px; color:var(–sky-dark); transition:transform .3s; }
.spot-drawer.expanded .drawer-chevron { transform:rotate(180deg); }

.drawer-list { overflow-y:auto; flex:1; -webkit-overflow-scrolling:touch; padding:6px 10px 20px; }
.drawer-list::-webkit-scrollbar { display:none; }

/* Spot row (shared between sidebar & drawer) */
.spot-row {
display:flex; align-items:center; gap:10px;
padding:11px 12px; border-radius:8px; margin-bottom:4px;
cursor:pointer; transition:background .15s; border:1px solid transparent;
}
.spot-row:hover { background:var(–sky); border-color:var(–glass-border); }
.spot-row.active { background:var(–sky2); border-color:var(–sky-dark); }

.spot-row-idx { font-family:‘Yomogi’,cursive; font-size:15px; color:var(–sky3); width:22px; flex-shrink:0; text-align:right; }
.spot-row-icon { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; background:var(–sky); border:1px solid var(–glass-border); }
.spot-row.active .spot-row-icon { background:var(–sky2); }
.spot-row-body { flex:1; min-width:0; }
.spot-row-title { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.spot-row-work { font-size:10px; color:var(–accent); font-weight:700; margin-top:1px; }
.spot-row-loc { font-size:10px; color:var(–muted); margin-top:1px; }
.spot-row-count { font-family:‘Yomogi’,cursive; font-size:9px; color:var(–sky-dark); flex-shrink:0; text-align:right; }

/* ── LOADING ── */
.loading {
position:fixed; inset:0; z-index:1000;
background:var(–sky);
display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
.loading.hide { display:none; }
.loading-logo { font-family:‘Yomogi’,cursive; font-size:72px; letter-spacing:.08em; color:var(–black); line-height:1; margin-bottom:8px; }
.loading-en { font-family:‘Yomogi’,cursive; font-size:11px; color:var(–sky-dark); letter-spacing:.12em; margin-top:-8px; }
.loading-bar { width:180px; height:2px; background:var(–sky3); border-radius:1px; overflow:hidden; }
.loading-fill { height:100%; background:var(–accent); animation:loadSlide 1.6s ease-in-out infinite; }
@keyframes loadSlide { 0%{width:0;margin-left:0} 50%{width:60%} 100%{width:0;margin-left:100%} }
.loading-tagline { font-family:‘Yomogi’,cursive; font-size:16px; color:var(–sky-dark); margin:-6px 0 16px; letter-spacing:.04em; }
.loading-sub { font-family:‘Yomogi’,cursive; font-size:13px; color:var(–sky-dark); letter-spacing:.08em; margin-top:12px; }

/* Error */
.error-screen { position:fixed; inset:0; z-index:1000; background:var(–sky); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
.error-screen.hide { display:none; }
.error-title { font-family:‘Yomogi’,cursive; font-size:40px; color:#c0392b; }
.error-msg { font-size:12px; color:var(–muted); text-align:center; max-width:280px; line-height:1.8; font-family:‘Yomogi’,cursive; }
.retry-btn { height:40px; padding:0 28px; background:var(–accent); color:var(–white); border:none; border-radius:6px; font-family:‘Yomogi’,cursive; font-size:12px; font-weight:700; cursor:pointer; }

/* Toast */
.toast {
position:fixed; bottom:20px; left:50%;
transform:translateX(-50%) translateY(60px);
background:var(–glass); border:1px solid var(–glass-border);
backdrop-filter:blur(16px);
color:var(–black); padding:10px 18px; border-radius:20px;
font-size:12px; font-weight:700; letter-spacing:.03em;
box-shadow:0 4px 20px rgba(74,156,199,0.2);
transition:transform .25s ease; z-index:2000; white-space:nowrap;
}
.toast.show { transform:translateX(-50%) translateY(0); }

@media (max-width:768px) {
.detail-panel { display:none !important; }
.mobile-sheet { display:block; }
.spot-drawer { display:flex; }
.map-badge { top:10px; right:10px; }
.header-search { display:none; }
}
</style>

</head>
<body>

<!-- Loading -->

<div class="loading" id="loading">
  <div class="loading-logo" id="splashLogo">アニしゃ</div>
  <div class="loading-en">AniFrame</div>
  <div class="loading-tagline" id="splashTagline">あのシーンを、あなたの手で。</div>
  <div class="loading-bar" id="splashBar"><div class="loading-fill"></div></div>
  <div class="loading-sub" id="splashSub">Loading Sacred Sites...</div>
</div>

<!-- Error -->

<div class="error-screen hide" id="errorScreen">
  <div class="error-title">ERROR</div>
  <div class="error-msg" id="errorMsg">データの取得に失敗しました。</div>
  <button class="retry-btn" onclick="location.reload()">Retry</button>
</div>

<!-- Slide Menu Overlay -->

<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

<!-- Slide Menu -->

<div class="slide-menu" id="slideMenu">
  <div class="menu-header">
    <div class="menu-header-top">
      <div class="menu-title">聖地リスト</div>
      <div class="menu-close" onclick="closeMenu()">✕</div>
    </div>
    <input class="menu-search" type="search" placeholder="🔍 作品名・場所で検索..." oninput="menuSearch(this.value)" id="menuSearchInput">
  </div>
  <div class="menu-stats">
    <div class="menu-stat">
      <div class="menu-stat-num" id="menuStatSpots">—</div>
      <div class="menu-stat-label">Spots</div>
    </div>
    <div class="menu-stat">
      <div class="menu-stat-num" id="menuStatWorks">—</div>
      <div class="menu-stat-label">Works</div>
    </div>
    <div class="menu-stat">
      <div class="menu-stat-num" id="menuStatPhotos">—</div>
      <div class="menu-stat-label">Photos</div>
    </div>
  </div>
  <div class="menu-body" id="menuBody"></div>
</div>

<!-- Header -->

<header>
  <div class="menu-trigger" id="menuTrigger" onclick="toggleMenu()">
    <div class="hamburger-line"></div>
    <div class="hamburger-line"></div>
    <div class="hamburger-line"></div>
  </div>
  <div class="logo">
    <span class="logo-ja">アニしゃ</span>
    <span class="logo-slash">/</span>
    <span class="logo-en">AniFrame</span>
  </div>
  <input class="header-search" type="search" placeholder="🔍 作品名・場所で検索..." oninput="searchSpots(this.value)">
  <div class="header-right">
    <button class="h-btn fill" onclick="showToast('スポット登録 Coming Soon ✨')">＋ 登録</button>
  </div>
</header>

<!-- Map -->

<div class="map-wrap">
  <div id="map"></div>

  <div class="map-badge">
    <div class="map-badge-num" id="countNum">—</div>
    <div class="map-badge-label">Sacred Sites</div>
  </div>

  <!-- Desktop detail panel -->

  <div class="detail-panel" id="detailPanel">
    <div class="detail-inner">
      <div class="detail-scenes">
        <div class="scene-box">
          <div class="scene-emoji" id="detailEmoji">⛩️</div>
          <div class="scene-label">Anime</div>
        </div>
        <div class="scene-box">
          <div class="scene-emoji">📍</div>
          <div class="scene-label">Real</div>
        </div>
      </div>
      <div class="detail-body">
        <div class="detail-text">
          <div class="detail-title" id="detailTitle">—</div>
          <div class="detail-work" id="detailWork">—</div>
          <div class="detail-tags" id="detailTags"></div>
        </div>
        <div class="detail-actions">
          <button class="d-btn fill" onclick="openNavi()">📍 Navigate</button>
          <button class="d-btn" onclick="showToast('構図ガイド Coming Soon 🎬')">🎬 Scene</button>
          <button class="d-btn close" onclick="closeDetail()">✕</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Mobile Sheet -->

<div class="mobile-sheet" id="mobileSheet">
  <div class="sheet-drag" onclick="closeDetail()"><div class="sheet-drag-bar"></div></div>
  <div class="sheet-body">
    <div class="sheet-emoji" id="sheetEmoji">⛩️</div>
    <div class="sheet-title" id="sheetTitle">—</div>
    <div class="sheet-work" id="sheetWork">—</div>
    <div class="sheet-tags" id="sheetTags"></div>
    <div class="sheet-btns">
      <button class="d-btn fill" onclick="openNavi()">📍 Navigate</button>
      <button class="d-btn" onclick="showToast('構図ガイド Coming Soon 🎬')">🎬 Scene</button>
      <button class="d-btn close" onclick="closeDetail()">✕</button>
    </div>
  </div>
</div>

<!-- Mobile Spot Drawer -->

<div class="spot-drawer" id="spotDrawer">
  <div class="drawer-peek" onclick="toggleDrawer()">
    <div class="drawer-peek-left">
      <div class="drawer-peek-num" id="drawerNum">—</div>
      <div class="drawer-peek-label">Sacred Sites</div>
    </div>
    <div class="drawer-chevron">▲</div>
  </div>
  <div class="drawer-list" id="drawerList"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://zzpfnszijxkfxtietilr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6cGZuc3ppanhrZnh0aWV0aWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTI2MzMsImV4cCI6MjA5MDU4ODYzM30.gqVLopJ3kveG1YwAcF6LQ7GFS2tZ0VRlHAG7M4je2Z0';

async function fetchSpots() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/spots?select=*&order=count.desc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

// Map
const map = L.map('map', { center:[36.5,137.5], zoom:6, zoomControl:false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution:'© OpenStreetMap', maxZoom:19 }).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

const tagColors = { kimi:'#e05a6a', slam:'#2ecc71', tenki:'#7c5cbf', other:'#e6a817' };

let allSpots=[], filteredSpots=[], markers={}, currentSpot=null, drawerOpen=false, menuOpen=false;

function makeIcon(emoji, tag) {
  const c = tagColors[tag]||'#888';
  return L.divIcon({
    className:'',
    html:`<div class="pin-wrap">
      <div class="pin-head" style="background:${c}"><span>${emoji||'📍'}</span></div>
      <div class="pin-tail"></div>
    </div>`,
    iconSize:[34,43], iconAnchor:[17,43], popupAnchor:[0,-47],
  });
}

// ── Menu ──
function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('slideMenu').classList.toggle('open', menuOpen);
  document.getElementById('menuOverlay').classList.toggle('show', menuOpen);
  document.getElementById('menuTrigger').classList.toggle('open', menuOpen);
}
function closeMenu() {
  menuOpen = false;
  document.getElementById('slideMenu').classList.remove('open');
  document.getElementById('menuOverlay').classList.remove('show');
  document.getElementById('menuTrigger').classList.remove('open');
}

function renderMenu(spots) {
  // Group by work
  const works = {};
  spots.forEach(s => {
    if (!works[s.work]) works[s.work] = { spots:[], emoji: s.emoji||'📍', tag: s.tag };
    works[s.work].spots.push(s);
  });

  const totalPhotos = spots.reduce((a,s)=>a+(s.count||0),0);
  document.getElementById('menuStatSpots').textContent = spots.length;
  document.getElementById('menuStatWorks').textContent = Object.keys(works).length;
  document.getElementById('menuStatPhotos').textContent = totalPhotos >= 1000 ? (totalPhotos/1000).toFixed(1)+'k' : totalPhotos;

  document.getElementById('menuBody').innerHTML = Object.entries(works).map(([work, data]) => `
    <div class="work-section" id="ws-${work.replace(/[^a-zA-Z0-9]/g,'_')}">
      <div class="work-header" onclick="toggleWork(this)">
        <div class="work-header-left">
          <div class="work-emoji">${data.spots[0].emoji||'📍'}</div>
          <div class="work-name">${work}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="work-count">${data.spots.length}</div>
          <div class="work-chevron">▼</div>
        </div>
      </div>
      <div class="work-spots">
        ${data.spots.map(s => `
          <div class="menu-spot-item ${currentSpot?.id===s.id?'active':''}" id="mi-${s.id}" onclick="selectSpot('${s.id}');closeMenu()">
            <div class="menu-spot-dot" style="background:${tagColors[s.tag]||'#888'}"></div>
            <div style="flex:1;min-width:0">
              <div class="menu-spot-name">${s.title}</div>
              <div class="menu-spot-loc">📍 ${s.location||'—'}</div>
            </div>
            <div class="menu-spot-photos">📸${(s.count||0).toLocaleString()}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleWork(el) {
  el.closest('.work-section').classList.toggle('open');
}

function menuSearch(q) {
  const query = q.trim().toLowerCase();
  const res = !query ? allSpots : allSpots.filter(s =>
    s.title.toLowerCase().includes(query) ||
    s.work.toLowerCase().includes(query) ||
    (s.location||'').toLowerCase().includes(query)
  );
  renderMenu(res);
  // Auto open matching sections
  if (query) document.querySelectorAll('.work-section').forEach(ws => ws.classList.add('open'));
}

// ── Markers & List ──
function renderMarkers(spots) {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  spots.forEach(s => {
    const m = L.marker([s.lat,s.lng], { icon:makeIcon(s.emoji,s.tag) })
      .addTo(map)
      .bindPopup(`<div class="popup-body">
        <div class="popup-title">${s.title}</div>
        <div class="popup-work">${s.work}</div>
        <div class="popup-meta">
          <span class="popup-tag">📍 ${s.location||'—'}</span>
          <span class="popup-tag">📸 ${(s.count||0).toLocaleString()}</span>
          ${s.diff?`<span class="popup-tag">${s.diff}</span>`:''}
        </div>
        <button class="popup-cta" onclick="selectSpot('${s.id}')">詳細を見る →</button>
      </div>`, { maxWidth:230 })
      .on('click', () => selectSpot(s.id));
    markers[s.id] = m;
  });
  document.getElementById('countNum').textContent = spots.length;
  document.getElementById('drawerNum').textContent = spots.length;
}

function renderDrawerList(spots) {
  const html = spots.map((s,i) => `
    <div class="spot-row ${currentSpot?.id===s.id?'active':''}" id="dr-${s.id}" onclick="selectSpot('${s.id}')">
      <div class="spot-row-idx">${String(i+1).padStart(2,'0')}</div>
      <div class="spot-row-icon">${s.emoji||'📍'}</div>
      <div class="spot-row-body">
        <div class="spot-row-title">${s.title}</div>
        <div class="spot-row-work">${s.work}</div>
        <div class="spot-row-loc">📍 ${s.location||'—'}</div>
      </div>
      <div class="spot-row-count">📸${(s.count||0).toLocaleString()}</div>
    </div>
  `).join('');
  document.getElementById('drawerList').innerHTML = html || '<div style="padding:20px;text-align:center;font-size:11px;color:#aaa;font-family:'Yomogi',cursive">No results</div>';
}

// ── Select ──
function selectSpot(id) {
  const s = allSpots.find(x => x.id === id);
  if (!s) return;
  currentSpot = s;

  document.querySelectorAll('.spot-row,.menu-spot-item').forEach(el => el.classList.remove('active'));
  ['dr-'+id,'mi-'+id].forEach(sid => {
    const el = document.getElementById(sid);
    if (el) { el.classList.add('active'); el.scrollIntoView({behavior:'smooth',block:'nearest'}); }
  });

  map.flyTo([s.lat,s.lng], 15, { duration:0.9 });
  if (markers[id]) markers[id].openPopup();

  const tagHtml = [
    s.location&&`<span class="detail-tag">📍 ${s.location}</span>`,
    s.count&&`<span class="detail-tag">📸 ${s.count.toLocaleString()}</span>`,
    s.diff&&`<span class="detail-tag">${s.diff}</span>`,
    s.ep&&`<span class="detail-tag">${s.ep}</span>`,
  ].filter(Boolean).join('');

  // Desktop
  document.getElementById('detailEmoji').textContent = s.emoji||'📍';
  document.getElementById('detailTitle').textContent = s.title;
  document.getElementById('detailWork').textContent = `${s.work}${s.ep?' — '+s.ep:''}`;
  document.getElementById('detailTags').innerHTML = tagHtml;
  document.getElementById('detailPanel').classList.add('show');

  // Mobile
  document.getElementById('sheetEmoji').textContent = s.emoji||'📍';
  document.getElementById('sheetTitle').textContent = s.title;
  document.getElementById('sheetWork').textContent = `${s.work}${s.ep?' — '+s.ep:''}`;
  document.getElementById('sheetTags').innerHTML = tagHtml.replace(/detail-tag/g,'sheet-tag');
  document.getElementById('mobileSheet').classList.add('show');
  document.getElementById('spotDrawer').classList.remove('expanded');
  drawerOpen = false;
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('show');
  document.getElementById('mobileSheet').classList.remove('show');
  document.querySelectorAll('.spot-row,.menu-spot-item').forEach(el => el.classList.remove('active'));
  currentSpot = null;
}

function openNavi() {
  if (!currentSpot) return;
  window.open(`https://www.google.com/maps/search/?api=1&query=${currentSpot.lat},${currentSpot.lng}`, '_blank');
}

function toggleDrawer() {
  drawerOpen = !drawerOpen;
  document.getElementById('spotDrawer').classList.toggle('expanded', drawerOpen);
  if (drawerOpen) closeDetail();
}

function searchSpots(q) {
  const query = q.trim().toLowerCase();
  filteredSpots = !query ? [...allSpots] : allSpots.filter(s =>
    s.title.toLowerCase().includes(query) ||
    s.work.toLowerCase().includes(query) ||
    (s.location||'').toLowerCase().includes(query)
  );
  renderMarkers(filteredSpots);
  renderDrawerList(filteredSpots);
  renderMenu(filteredSpots);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

map.on('click', e => {
  if (!e.originalEvent.target.closest('.pin-wrap')) closeDetail();
});

// スプラッシュ → 本編
async function boot() {
  // フェードイン演出（1.5秒見せてから読み込み開始）
  await new Promise(r => setTimeout(r, 1500));

  // リトライ付きfetch
  let attempts = 0;
  while (attempts < 3) {
    try {
      document.getElementById('splashSub').textContent = attempts > 0 ? `再接続中... (${attempts}/3)` : 'Loading Sacred Sites...';
      allSpots = await fetchSpots();
      break;
    } catch(e) {
      attempts++;
      if (attempts >= 3) {
        document.getElementById('loading').classList.add('hide');
        document.getElementById('errorScreen').classList.remove('hide');
        document.getElementById('errorMsg').textContent = e.message;
        return;
      }
      await new Promise(r => setTimeout(r, 1200));
    }
  }

  filteredSpots = [...allSpots];
  renderMarkers(filteredSpots);
  renderDrawerList(filteredSpots);
  renderMenu(allSpots);
  if (allSpots.length > 0)
    map.flyToBounds(L.latLngBounds(allSpots.map(s=>[s.lat,s.lng])), {padding:[60,80],duration:1.4});

  // スプラッシュをフェードアウト
  const splash = document.getElementById('loading');
  splash.style.transition = 'opacity 0.6s ease';
  splash.style.opacity = '0';
  setTimeout(() => {
    splash.classList.add('hide');
    splash.style.opacity = '';
    showToast(`✓ ${allSpots.length}件の聖地を発見！`);
  }, 600);
}

boot();
</script>

</body>
</html>
