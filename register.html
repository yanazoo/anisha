<style>
:root {
  --white:#fff; --black:#0d0d0d; --border:#e2e6ea;
  --sky:#e8f4fd; --sky2:#d0eaf8; --sky3:#b8dff5;
  --sky-dark:#4a9cc7; --accent:#1a7fc1; --muted:#666;
  --glass:rgba(232,244,253,0.96); --gb:rgba(74,156,199,0.35);
  --success:#22c55e; --error:#ef4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--sky);min-height:100vh;font-family:'Yomogi',cursive;padding:20px 16px 60px;}

.header{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
.back{width:36px;height:36px;border-radius:8px;border:1px solid var(–gb);
background:var(–white);display:flex;align-items:center;justify-content:center;
font-size:18px;cursor:pointer;color:var(–muted);text-decoration:none;line-height:1;}
.page-title{font-size:20px;color:var(–black);}
.page-sub{font-size:11px;color:var(–sky-dark);margin-top:2px;}

/* STEPS */
.steps{display:flex;align-items:center;margin-bottom:28px;}
.step{display:flex;align-items:center;gap:6px;}
.sc{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;
justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;
border:2px solid var(–border);background:var(–white);color:var(–muted);}
.sc.active{border-color:var(–accent);background:var(–accent);color:var(–white);}
.sc.done{border-color:var(–success);background:var(–success);color:var(–white);}
.sl{font-size:11px;color:var(–muted);}
.sl.active{color:var(–accent);font-weight:700;}
.sline{flex:1;height:1px;background:var(–border);margin:0 6px;}

/* CARD */
.card{background:var(–white);border-radius:14px;border:1px solid var(–gb);
padding:18px;margin-bottom:14px;box-shadow:0 2px 10px rgba(74,156,199,0.08);}
.card-title{font-size:13px;color:var(–sky-dark);margin-bottom:12px;letter-spacing:.04em;}

/* INPUT */
.url-input{width:100%;height:46px;padding:0 14px;
background:var(–sky);border:1.5px solid var(–gb);border-radius:10px;
color:var(–black);font-family:‘Yomogi’,cursive;font-size:13px;outline:none;
transition:all .2s;margin-bottom:10px;}
.url-input:focus{background:var(–white);border-color:var(–sky-dark);}
.url-input::placeholder{color:#aac4d8;}

.url-badge{display:inline-block;padding:3px 10px;border-radius:12px;
font-size:11px;font-weight:700;margin-bottom:10px;display:none;}
.url-badge.show{display:inline-block;}
.url-badge.youtube{background:#ffe4e4;color:#cc0000;}
.url-badge.other{background:var(–sky2);color:var(–sky-dark);}

.analyze-btn{width:100%;height:46px;border-radius:10px;
background:var(–accent);border:none;color:var(–white);
font-family:‘Yomogi’,cursive;font-size:14px;font-weight:700;
cursor:pointer;transition:all .2s;}
.analyze-btn:hover{background:#1568a0;}
.analyze-btn:active{transform:scale(0.98);}

/* ANALYZING */
.analyzing{display:none;flex-direction:column;align-items:center;gap:12px;padding:24px 0;}
.analyzing.show{display:flex;}
.spin{width:40px;height:40px;border-radius:50%;
border:3px solid var(–sky3);border-top-color:var(–accent);
animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.at{font-size:13px;color:var(–sky-dark);}
.as{font-size:11px;color:var(–muted);}

/* FORM */
.field{margin-bottom:12px;}
.fl{font-size:11px;color:var(–sky-dark);margin-bottom:5px;letter-spacing:.04em;}
.fi{width:100%;height:40px;padding:0 12px;
background:var(–sky);border:1.5px solid var(–gb);border-radius:8px;
color:var(–black);font-family:‘Yomogi’,cursive;font-size:13px;outline:none;}
.fi:focus{background:var(–white);border-color:var(–sky-dark);}
.fh{font-size:10px;color:var(–muted);margin-top:3px;}
.crow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* MAP PREVIEW */
.map-prev{width:100%;height:180px;border-radius:10px;
background:var(–sky2);border:1px solid var(–gb);
display:flex;align-items:center;justify-content:center;
margin-bottom:12px;font-size:13px;color:var(–sky-dark);text-align:center;
flex-direction:column;gap:8px;}

/* CANDIDATES */
.candidates{margin-bottom:12px;}
.cand-label{font-size:11px;color:var(–sky-dark);margin-bottom:8px;}
.cand-item{padding:10px 14px;border-radius:8px;border:1px solid var(–gb);
background:var(–sky);margin-bottom:6px;cursor:pointer;transition:all .2s;}
.cand-item:hover,.cand-item.selected{background:var(–sky2);border-color:var(–sky-dark);}
.cand-name{font-size:13px;font-weight:700;}
.cand-loc{font-size:10px;color:var(–muted);margin-top:2px;}
.cand-conf{font-size:10px;color:var(–sky-dark);}

/* SUBMIT */
.submit-btn{width:100%;height:48px;border-radius:12px;
background:linear-gradient(135deg,var(–accent),#1568a0);
border:none;color:var(–white);font-family:‘Yomogi’,cursive;
font-size:15px;font-weight:700;cursor:pointer;
box-shadow:0 4px 14px rgba(26,127,193,0.3);transition:all .2s;}
.submit-btn:hover{transform:translateY(-1px);}
.submit-btn:active{transform:scale(0.98);}
.submit-btn:disabled{background:var(–border);color:var(–muted);box-shadow:none;cursor:not-allowed;}

/* SUCCESS */
.success{display:none;flex-direction:column;align-items:center;
gap:14px;padding:28px 16px;text-align:center;}
.success.show{display:flex;}
.sicon{font-size:52px;}
.stitle{font-size:22px;color:var(–black);}
.ssub{font-size:12px;color:var(–muted);line-height:1.8;}
.sspot{background:var(–sky);border:1px solid var(–gb);
border-radius:10px;padding:12px 16px;width:100%;text-align:left;}
.sspot-name{font-size:15px;font-weight:700;margin-bottom:3px;}
.sspot-work{font-size:11px;color:var(–accent);}
.sbtns{display:flex;gap:8px;width:100%;}
.sbtn{flex:1;height:42px;border-radius:10px;font-family:‘Yomogi’,cursive;
font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;border:none;}
.sbtn.p{background:var(–accent);color:var(–white);}
.sbtn.s{background:var(–white);border:1px solid var(–gb);color:var(–black);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;
transform:translateX(-50%) translateY(80px);
background:var(–black);color:var(–white);
padding:10px 20px;border-radius:20px;font-size:12px;font-weight:700;
transition:transform .25s;z-index:1000;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>

</head>

<script>
const SUPABASE_URL = 'https://zzpfnszijxkfxtietilr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6cGZuc3ppanhrZnh0aWV0aWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTI2MzMsImV4cCI6MjA5MDU4ODYzM30.gqVLopJ3kveG1YwAcF6LQ7GFS2tZ0VRlHAG7M4je2Z0';
const AI_PROVIDER = 'gemini'; // 切り替えはここだけ

// ── URL入力 ──
document.getElementById('urlInput').addEventListener('input', function() {
  const val = this.value.trim();
  const badge = document.getElementById('urlBadge');
  if (val.includes('youtube.com') || val.includes('youtu.be')) {
    badge.textContent = '▶ YouTube';
    badge.className = 'url-badge show youtube';
  } else if (val.length > 0) {
    badge.textContent = '🔗 URL';
    badge.className = 'url-badge show other';
  } else {
    badge.className = 'url-badge';
  }
});

function setStep(n) {
  for (let i = 1; i <= 3; i++) {
    const c = document.getElementById('s'+i+'c');
    const l = document.getElementById('s'+i+'l');
    if (i < n) { c.className='sc done'; c.textContent='✓'; l.className='sl'; }
    else if (i === n) { c.className='sc active'; l.className='sl active'; }
    else { c.className='sc'; l.className='sl'; }
  }
}

const steps = [
  ['URLを確認中...','プラットフォームを判定しています'],
  ['タイトルを取得中...','動画情報を読み込んでいます'],
  ['作品名を特定中...','アニメ・マンガタイトルを検索しています'],
  ['場所を推定中...','聖地の住所を特定しています'],
  ['情報を整理中...','スポット情報をまとめています'],
];

// ── 解析開始 ──
async function startAnalyze() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { showToast('URLを入力してください'); return; }

  document.getElementById('c1').style.display = 'none';
  document.getElementById('c2').style.display = 'block';
  setStep(2);

  let idx = 0;
  const timer = setInterval(() => {
    if (idx < steps.length) {
      document.getElementById('at').textContent = steps[idx][0];
      document.getElementById('as').textContent = steps[idx][1];
      idx++;
    }
  }, 900);

  try {
    const result = await analyze(url);
    clearInterval(timer);

    document.getElementById('fWork').value = result.work || '';
    document.getElementById('fTitle').value = result.title || '';
    document.getElementById('fEp').value = result.ep || '';
    document.getElementById('fEmoji').value = result.emoji || '📍';
    document.getElementById('fLocation').value = result.location || '';

    if (result.candidates && result.candidates.length > 0) {
      showCandidates(result.candidates);
    }
    if (result.location) geocode(result.location);

    document.getElementById('c2').style.display = 'none';
    document.getElementById('c3').style.display = 'block';
    setStep(3);

  } catch(e) {
    clearInterval(timer);
    console.error('analyze error:', e);
    document.getElementById('c2').style.display = 'none';
    document.getElementById('c3').style.display = 'block';
    setStep(3);
    showToast('AI解析失敗。手動で入力してください。');
  }
}

// ── AI解析（プロバイダー抽象化） ──
async function analyze(url) {
  // YouTubeサムネイル取得
  let imageUrl = null;
  const ytMatch = url.match(/(?:v=|youtu\.be\/|shorts\/)([^&?#\/]+)/);
  if (ytMatch) {
    imageUrl = 'https://img.youtube.com/vi/' + ytMatch[1] + '/maxresdefault.jpg';
  }

  const prompt = 'あなたはアニメ・マンガの聖地巡礼専門家です。この画像または投稿URLから聖地情報をJSONで返してください。キー: work(作品名), title(スポット名), location(住所), ep(エピソード), emoji(絵文字1文字), confidence(確信度0-100), candidates([{name,location,confidence}]最大3件)。JSONのみ。説明不要。';

  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ imageUrl, prompt, url })
  });

  if (!res.ok) throw new Error('API ' + res.status);
  return await res.json();
}

// ── 候補表示 ──
function showCandidates(candidates) {
  const box = document.getElementById('candidatesBox');
  const list = document.getElementById('candidatesList');
  box.style.display = 'block';
  list.innerHTML = candidates.map((c, i) =>
    '<div class="cand-item" id="ci'+i+'" onclick="pickCandidate(\''+encodeURIComponent(c.location||c.name)+'\','+i+')">' +
    '<div style="display:flex;justify-content:space-between;align-items:center">' +
    '<div class="cand-name">' + (c.name||c.location) + '</div>' +
    '<div class="cand-conf">確信度 ' + (c.confidence||'?') + '%</div>' +
    '</div>' +
    '<div class="cand-loc">📍 ' + (c.location||'—') + '</div>' +
    '</div>'
  ).join('');
}

function pickCandidate(loc, idx) {
  document.querySelectorAll('.cand-item').forEach(el => el.classList.remove('selected'));
  document.getElementById('ci'+idx).classList.add('selected');
  const location = decodeURIComponent(loc);
  document.getElementById('fLocation').value = location;
  geocode(location);
}

// ── 住所→座標 ──
let gTimer = null;
function onLocationInput(val) {
  clearTimeout(gTimer);
  if (val.length > 3) gTimer = setTimeout(() => geocode(val), 800);
}

async function geocode(address) {
  // 複数のジオコーディングAPIを順番に試す
  const apis = [
    // Nominatim (OSM) - 無料
    async () => {
      const r = await fetch(
        'https://nominatim.openstreetmap.org/search?format=json&q=' +
        encodeURIComponent(address) + '&limit=1&accept-language=ja&countrycodes=jp',
        { headers: { 'User-Agent': 'AniFrame/1.0 (anisha-rho.vercel.app)' } }
      );
      const d = await r.json();
      if (d && d[0]) return { lat: d[0].lat, lng: d[0].lon };
      return null;
    },
    // Photon (Komoot) - 無料バックアップ
    async () => {
      const r = await fetch(
        'https://photon.komoot.io/api/?q=' + encodeURIComponent(address) + '&limit=1&lang=ja'
      );
      const d = await r.json();
      if (d && d.features && d.features[0]) {
        const coords = d.features[0].geometry.coordinates;
        return { lat: coords[1], lng: coords[0] };
      }
      return null;
    }
  ];

  for (const api of apis) {
    try {
      const result = await api();
      if (result) {
        const lat = parseFloat(result.lat).toFixed(6);
        const lng = parseFloat(result.lng).toFixed(6);
        document.getElementById('fLat').value = lat;
        document.getElementById('fLng').value = lng;
        document.getElementById('mapPrev').innerHTML =
          '<div style="font-size:32px">📍</div>' +
          '<div style="font-size:12px;font-weight:700">' + address + '</div>' +
          '<div style="font-size:11px;color:var(--muted)">' + lat + ', ' + lng + '</div>' +
          '<div style="font-size:11px;color:var(--success);font-weight:700">✓ 座標取得完了</div>';
        return;
      }
    } catch(e) {
      console.log('geocode fallback:', e.message);
    }
  }
  console.error('全てのジオコーダーが失敗しました');
}

// ── 登録 ──
async function submitSpot() {
  const work = document.getElementById('fWork').value.trim();
  const title = document.getElementById('fTitle').value.trim();
  const location = document.getElementById('fLocation').value.trim();
  const lat = parseFloat(document.getElementById('fLat').value);
  const lng = parseFloat(document.getElementById('fLng').value);

  if (!work || !title) { showToast('作品名とスポット名は必須です'); return; }
  if (!lat || !lng) { showToast('住所を入力して座標を取得してください'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '登録中...';

  const tag = work.includes('君の名')||work.includes('新海') ? 'kimi'
    : work.includes('スラム')||work.includes('SLAM') ? 'slam'
    : work.includes('天気') ? 'tenki' : 'other';

  const spot = {
    title, work, tag, lat, lng, location,
    emoji: document.getElementById('fEmoji').value || '📍',
    ep: document.getElementById('fEp').value.trim() || null,
    count: 0, diff: '★☆☆',
    status: 'unconfirmed', confidence: 0
  };

  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/spots', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(spot)
    });
    if (!res.ok) throw new Error('保存失敗 ' + res.status);

    document.getElementById('c3').style.display = 'none';
    document.getElementById('c4').style.display = 'block';
    document.getElementById('sspot').innerHTML =
      '<div class="sspot-name">' + spot.emoji + ' ' + spot.title + '</div>' +
      '<div class="sspot-work">' + spot.work + ' · 📍 ' + spot.location + '</div>';
    document.getElementById('s3c').className = 'sc done';
    document.getElementById('s3c').textContent = '✓';

  } catch(e) {
    showToast('登録失敗: ' + e.message);
    btn.disabled = false; btn.textContent = '地図に登録する 📍';
  }
}

function reset() {
  document.getElementById('urlInput').value = '';
  document.getElementById('urlBadge').className = 'url-badge';
  document.getElementById('c4').style.display = 'none';
  document.getElementById('c1').style.display = 'block';
  setStep(1);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
