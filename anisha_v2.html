<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>アニしゃ / AniFrame</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Kaisei+Decol:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #06060f;
  --ink: #0d0d1f;
  --card: #111128;
  --border: #1e1e3f;
  --accent: #e8334a;
  --accent2: #6c35de;
  --gold: #f0c040;
  --sakura: #f48fb1;
  --sky: #4fc3f7;
  --text: #eeeeff;
  --muted: #5a5a7a;
  --success: #00e5a0;
  --glow: rgba(232,51,74,0.35);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background:var(--bg);
  color:var(--text);
  font-family:'Zen Kaku Gothic New',sans-serif;
  height:100vh; height:100dvh;
  display:flex; flex-direction:column;
  overflow:hidden;
  position:relative;
}

/* Animated background */
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 50% 40% at 20% 20%, rgba(108,53,222,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 80% 80%, rgba(232,51,74,0.06) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

/* ── HEADER ── */
header {
  position:relative; z-index:100;
  background:rgba(6,6,15,0.92);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  flex-shrink:0;
}

.header-top {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 0 8px;
}

.logo {
  display:flex; align-items:center; gap:8px;
}

.logo-mark {
  width:36px; height:36px;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Kaisei Decol', serif;
  font-size:16px; font-weight:700;
  color:white;
  box-shadow:0 4px 14px var(--glow);
  position:relative;
  overflow:hidden;
}

.logo-mark::after {
  content:'';
  position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
}

.logo-text { display:flex; flex-direction:column; gap:1px; }
.logo-ja { font-size:16px; font-weight:900; letter-spacing:-.01em; line-height:1; }
.logo-en { font-family:'Space Mono',monospace; font-size:9px; color:var(--accent); letter-spacing:.1em; }

.header-actions { display:flex; gap:8px; align-items:center; }

.icon-btn {
  width:36px; height:36px; border-radius:10px;
  border:1px solid var(--border); background:var(--card);
  color:var(--muted); font-size:16px;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s;
}
.icon-btn:active { transform:scale(0.92); }
.icon-btn.primary { background:var(--accent); border-color:var(--accent); color:white; box-shadow:0 4px 12px var(--glow); }

/* Filter scroll */
.filter-scroll {
  display:flex; gap:8px;
  overflow-x:auto; padding:0 0 12px;
  scrollbar-width:none;
}
.filter-scroll::-webkit-scrollbar { display:none; }

.filter-chip {
  display:flex; align-items:center; gap:5px;
  padding:6px 14px; border-radius:20px;
  font-size:12px; font-weight:700;
  border:1px solid var(--border); background:var(--card);
  color:var(--muted); white-space:nowrap;
  cursor:pointer; transition:all .2s; flex-shrink:0;
  font-family:'Zen Kaku Gothic New',sans-serif;
}
.filter-chip:active { transform:scale(0.95); }
.filter-chip.active {
  background:var(--accent); border-color:var(--accent);
  color:white; box-shadow:0 3px 10px var(--glow);
}
.filter-chip .chip-dot {
  width:6px; height:6px; border-radius:50%;
  background:currentColor; opacity:0.7;
}

/* ── MAP ── */
.map-wrap {
  flex:1; position:relative; overflow:hidden;
}

#map {
  width:100%; height:100%;
  z-index:1;
}

/* Dark map */
.leaflet-tile {
  filter: invert(1) hue-rotate(180deg) brightness(0.75) contrast(0.85) saturate(0.5);
}
.leaflet-container { background:var(--bg); }
.leaflet-control-zoom a {
  background:var(--card) !important;
  color:var(--text) !important;
  border-color:var(--border) !important;
}

/* Custom pin */
.pin-wrap {
  display:flex; flex-direction:column; align-items:center;
  cursor:pointer; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.5));
}
.pin-body {
  width:36px; height:36px;
  border-radius:50% 50% 50% 4px;
  transform:rotate(-45deg);
  display:flex; align-items:center; justify-content:center;
  border:2px solid rgba(255,255,255,0.25);
  transition:transform .2s;
}
.pin-emoji { transform:rotate(45deg); font-size:15px; line-height:1; }
.pin-tail {
  width:2px; height:6px;
  background:rgba(255,255,255,0.3);
  margin-top:-1px;
}

/* Map overlays */
.map-badge {
  position:absolute; top:12px; left:12px; z-index:400;
  background:rgba(6,6,15,0.88);
  border:1px solid var(--border);
  border-radius:10px; padding:8px 12px;
  backdrop-filter:blur(12px);
  pointer-events:none;
}
.map-badge-num {
  font-family:'Space Mono',monospace;
  font-size:20px; font-weight:700; line-height:1;
  color:var(--text);
}
.map-badge-num span { color:var(--accent); }
.map-badge-label { font-size:10px; color:var(--muted); margin-top:2px; }

/* Search bar on map */
.map-search {
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  z-index:400; width:calc(100% - 120px); max-width:300px;
}
.map-search input {
  width:100%; padding:10px 16px;
  background:rgba(6,6,15,0.9); border:1px solid var(--border);
  border-radius:24px; color:var(--text);
  font-family:'Zen Kaku Gothic New',sans-serif; font-size:13px;
  outline:none; backdrop-filter:blur(12px);
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  transition:border-color .2s;
}
.map-search input:focus { border-color:var(--accent2); }
.map-search input::placeholder { color:var(--muted); }

/* Loading */
.loading-overlay {
  position:absolute; inset:0; z-index:800;
  background:rgba(6,6,15,0.9);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:16px; backdrop-filter:blur(8px);
}
.loading-overlay.hide { display:none; }

.loading-ring {
  width:48px; height:48px; position:relative;
}
.loading-ring::before, .loading-ring::after {
  content:''; position:absolute; inset:0;
  border-radius:50%; border:3px solid transparent;
}
.loading-ring::before {
  border-top-color:var(--accent);
  animation:spin 0.9s linear infinite;
}
.loading-ring::after {
  border-bottom-color:var(--accent2);
  animation:spin 1.4s linear infinite reverse;
}
@keyframes spin { to { transform:rotate(360deg); } }

.loading-logo {
  font-family:'Kaisei Decol',serif;
  font-size:28px; font-weight:700;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
.loading-sub { font-size:12px; color:var(--muted); letter-spacing:.05em; }

/* ── BOTTOM SHEET (detail) ── */
.bottom-sheet {
  position:absolute; bottom:0; left:0; right:0; z-index:600;
  background:var(--ink);
  border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  transform:translateY(100%);
  transition:transform .4s cubic-bezier(0.32,0.72,0,1);
  box-shadow:0 -8px 40px rgba(0,0,0,0.5);
  padding:0 0 env(safe-area-inset-bottom);
}
.bottom-sheet.show { transform:translateY(0); }

.sheet-handle {
  width:36px; height:4px; border-radius:2px;
  background:var(--border); margin:10px auto 0;
}

.sheet-content { padding:16px 20px 24px; }

.sheet-top {
  display:flex; align-items:flex-start; gap:14px; margin-bottom:14px;
}

.sheet-compare {
  display:flex; gap:6px; flex-shrink:0;
}
.compare-box {
  width:72px; height:56px; border-radius:10px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; position:relative; overflow:hidden;
}
.compare-box.anime {
  background:linear-gradient(135deg, rgba(108,53,222,0.6), rgba(108,53,222,0.2));
  border:1px solid rgba(108,53,222,0.5);
}
.compare-box.real {
  background:linear-gradient(135deg, rgba(232,51,74,0.5), rgba(232,51,74,0.15));
  border:1px solid rgba(232,51,74,0.4);
}
.compare-emoji { font-size:20px; }
.compare-label {
  font-size:8px; font-weight:700; letter-spacing:.08em;
  color:rgba(255,255,255,0.5); text-transform:uppercase;
}

.sheet-info { flex:1; min-width:0; }
.sheet-title {
  font-family:'Kaisei Decol',serif;
  font-size:17px; font-weight:700; line-height:1.2;
  margin-bottom:4px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.sheet-work { font-size:12px; color:var(--accent2); font-weight:700; margin-bottom:8px; }
.sheet-tags { display:flex; gap:6px; flex-wrap:wrap; }
.sheet-tag {
  font-size:10px; color:var(--muted);
  background:var(--card); border:1px solid var(--border);
  border-radius:4px; padding:2px 8px;
}

.sheet-actions { display:flex; gap:8px; }
.sheet-btn {
  flex:1; padding:12px 8px; border-radius:12px;
  font-size:13px; font-weight:700; border:none;
  font-family:'Zen Kaku Gothic New',sans-serif;
  cursor:pointer; transition:all .2s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.sheet-btn:active { transform:scale(0.97); }
.sheet-btn.nav {
  background:linear-gradient(135deg, var(--accent), #c0223a);
  color:white; box-shadow:0 4px 14px var(--glow);
}
.sheet-btn.guide {
  background:linear-gradient(135deg, var(--accent2), #5020b0);
  color:white;
}
.sheet-btn.close-btn {
  background:var(--card); border:1px solid var(--border);
  color:var(--muted); flex:0; padding:12px 14px;
}

/* ── SPOT LIST DRAWER ── */
.list-drawer {
  position:absolute; bottom:0; left:0; right:0; z-index:500;
  background:var(--ink);
  border-top:1px solid var(--border);
  border-radius:20px 20px 0 0;
  transform:translateY(calc(100% - 56px));
  transition:transform .4s cubic-bezier(0.32,0.72,0,1);
  max-height:70vh;
  display:flex; flex-direction:column;
}
.list-drawer.expanded { transform:translateY(0); }
.list-drawer.hidden { transform:translateY(100%); }

.drawer-handle-area {
  padding:8px 20px 0;
  display:flex; align-items:center; justify-content:space-between;
  cursor:pointer; flex-shrink:0;
}
.drawer-handle { width:36px; height:4px; border-radius:2px; background:var(--border); }
.drawer-peek {
  display:flex; align-items:center; gap:8px;
  font-size:12px; font-weight:700; color:var(--muted);
  padding:6px 0;
}
.drawer-count {
  font-family:'Space Mono',monospace;
  font-size:11px; color:var(--accent);
}
.drawer-toggle {
  font-size:12px; color:var(--muted); transition:transform .3s;
}
.list-drawer.expanded .drawer-toggle { transform:rotate(180deg); }

.drawer-list {
  overflow-y:auto; flex:1; padding:8px 12px 24px;
  -webkit-overflow-scrolling:touch;
}
.drawer-list::-webkit-scrollbar { display:none; }

.list-item {
  display:flex; align-items:center; gap:12px;
  padding:12px 14px; border-radius:12px;
  margin-bottom:6px; cursor:pointer;
  background:var(--card); border:1px solid var(--border);
  transition:all .2s; position:relative; overflow:hidden;
}
.list-item:active { transform:scale(0.98); }
.list-item.active { border-color:var(--accent); }
.list-item::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:var(--accent); opacity:0;
  transition:opacity .2s;
}
.list-item.active::before { opacity:1; }

.list-item-emoji {
  width:36px; height:36px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.list-item-body { flex:1; min-width:0; }
.list-item-title {
  font-size:13px; font-weight:700;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:2px;
}
.list-item-work { font-size:11px; color:var(--accent2); font-weight:700; margin-bottom:2px; }
.list-item-loc { font-size:10px; color:var(--muted); }
.list-item-count {
  font-family:'Space Mono',monospace;
  font-size:10px; color:var(--muted); flex-shrink:0;
  text-align:right;
}

/* Popup */
.leaflet-popup-content-wrapper {
  background:var(--card) !important;
  border:1px solid var(--border) !important;
  border-radius:14px !important;
  box-shadow:0 8px 32px rgba(0,0,0,0.5) !important;
  color:var(--text) !important; padding:0 !important;
}
.leaflet-popup-content { margin:0 !important; }
.leaflet-popup-tip { background:var(--card) !important; }
.leaflet-popup-close-button { color:var(--muted) !important; padding:8px !important; }

.popup-body { padding:14px 16px; min-width:160px; }
.popup-title { font-size:14px; font-weight:700; margin-bottom:3px; }
.popup-work { font-size:11px; color:var(--accent2); font-weight:700; margin-bottom:4px; }
.popup-loc { font-size:10px; color:var(--muted); margin-bottom:10px; }
.popup-cta {
  width:100%; padding:9px; border-radius:8px;
  font-size:12px; font-weight:700; border:none;
  background:var(--accent); color:white;
  font-family:'Zen Kaku Gothic New',sans-serif; cursor:pointer;
}

/* Toast */
.toast {
  position:fixed; bottom:calc(60px + env(safe-area-inset-bottom));
  left:50%; transform:translateX(-50%) translateY(60px);
  background:var(--success); color:#06060f;
  padding:10px 20px; border-radius:24px;
  font-weight:700; font-size:13px;
  transition:transform .3s ease; z-index:2000;
  white-space:nowrap; box-shadow:0 4px 20px rgba(0,229,160,0.3);
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* Anime sakura particles */
.sakura {
  position:fixed; pointer-events:none; z-index:999;
  font-size:16px; opacity:0;
  animation:sakuraFall 4s ease-in forwards;
}
@keyframes sakuraFall {
  0% { opacity:0.8; transform:translateY(-20px) rotate(0deg); }
  100% { opacity:0; transform:translateY(100vh) rotate(360deg); }
}

/* Scan line effect */
body::after {
  content:'';
  position:fixed; inset:0; pointer-events:none; z-index:999;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
  );
}

/* Error state */
.error-state {
  position:absolute; inset:0; z-index:800;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:12px;
  background:rgba(6,6,15,0.95);
}
.error-state.hide { display:none; }
.error-icon { font-size:40px; }
.error-title { font-size:16px; font-weight:700; color:var(--accent); }
.error-msg { font-size:12px; color:var(--muted); text-align:center; padding:0 32px; line-height:1.6; }
.retry-btn {
  padding:12px 28px; border-radius:12px; border:none;
  background:var(--accent); color:white; font-weight:700; font-size:14px;
  font-family:'Zen Kaku Gothic New',sans-serif; cursor:pointer;
  box-shadow:0 4px 14px var(--glow);
}
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-mark">聖</div>
      <div class="logo-text">
        <span class="logo-ja">アニしゃ</span>
        <span class="logo-en">AniFrame</span>
      </div>
    </div>
    <div class="header-actions">
      <div class="icon-btn" onclick="toggleList()" title="リスト">☰</div>
      <div class="icon-btn primary" onclick="showToast('スポット登録 Coming Soon! 🎬')" title="登録">＋</div>
    </div>
  </div>
  <div class="filter-scroll" id="filterScroll">
    <div class="filter-chip active" onclick="filterSpots('all',this)"><span class="chip-dot"></span>すべて</div>
    <div class="filter-chip" onclick="filterSpots('kimi',this)">🌸 君の名は。</div>
    <div class="filter-chip" onclick="filterSpots('slam',this)">🏀 SLAM DUNK</div>
    <div class="filter-chip" onclick="filterSpots('tenki',this)">🌤️ 天気の子</div>
    <div class="filter-chip" onclick="filterSpots('other',this)">✨ その他</div>
  </div>
</header>

<!-- Map -->
<div class="map-wrap">
  <div id="map"></div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-ring"></div>
    <div class="loading-logo">アニしゃ</div>
    <div class="loading-sub">聖地データを読み込んでいます...</div>
  </div>

  <!-- Error -->
  <div class="error-state hide" id="errorState">
    <div class="error-icon">⚠️</div>
    <div class="error-title">接続エラー</div>
    <div class="error-msg" id="errorMsg">データの取得に失敗しました。</div>
    <button class="retry-btn" onclick="location.reload()">再試行</button>
  </div>

  <!-- Count badge -->
  <div class="map-badge">
    <div class="map-badge-num" id="countNum"><span>—</span></div>
    <div class="map-badge-label">聖地スポット</div>
  </div>

  <!-- Search -->
  <div class="map-search">
    <input type="search" id="searchInput" placeholder="🔍 作品名・場所で検索" oninput="searchSpots(this.value)">
  </div>

  <!-- Detail bottom sheet -->
  <div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content">
      <div class="sheet-top">
        <div class="sheet-compare">
          <div class="compare-box anime">
            <div class="compare-emoji" id="sheetEmoji">⛩️</div>
            <div class="compare-label">ANIME</div>
          </div>
          <div class="compare-box real">
            <div class="compare-emoji">📍</div>
            <div class="compare-label">REAL</div>
          </div>
        </div>
        <div class="sheet-info">
          <div class="sheet-title" id="sheetTitle">—</div>
          <div class="sheet-work" id="sheetWork">—</div>
          <div class="sheet-tags" id="sheetTags"></div>
        </div>
      </div>
      <div class="sheet-actions">
        <button class="sheet-btn nav" onclick="openNavi()">📍 ナビ開始</button>
        <button class="sheet-btn guide" onclick="showToast('構図ガイド Coming Soon! 🎬')">🎬 構図</button>
        <button class="sheet-btn close-btn" onclick="closeSheet()">✕</button>
      </div>
    </div>
  </div>

  <!-- List drawer -->
  <div class="list-drawer" id="listDrawer">
    <div class="drawer-handle-area" onclick="toggleList()">
      <div class="drawer-handle"></div>
      <div class="drawer-peek">
        <span>聖地リスト</span>
        <span class="drawer-count" id="drawerCount">— spots</span>
      </div>
      <div class="drawer-toggle">▲</div>
    </div>
    <div class="drawer-list" id="drawerList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Supabase ──
const SUPABASE_URL = 'https://zzpfnszijxkfxtietilr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6cGZuc3ppanhrZnh0aWV0aWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwMTI2MzMsImV4cCI6MjA5MDU4ODYzM30.gqVLopJ3kveG1YwAcF6LQ7GFS2tZ0VRlHAG7M4je2Z0';

async function fetchSpots() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/spots?select=*&order=count.desc`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
    }
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`HTTP ${res.status}: ${txt.slice(0,120)}`);
  }
  return await res.json();
}

// ── Leaflet ──
const map = L.map('map', {
  center: [36.5, 137.5], zoom: 6,
  zoomControl: false,
});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap', maxZoom:19,
}).addTo(map);
L.control.zoom({ position:'bottomright' }).addTo(map);

const colorMap = { kimi:'#e8334a', slam:'#00e5a0', tenki:'#6c35de', other:'#f0c040' };
const bgMap    = { kimi:'rgba(232,51,74,0.15)', slam:'rgba(0,229,160,0.12)', tenki:'rgba(108,53,222,0.15)', other:'rgba(240,192,64,0.12)' };

let allSpots = [], filteredSpots = [], markers = {}, currentSpot = null, currentFilter = 'all';
let listOpen = false;

function makeIcon(emoji, tag) {
  const c = colorMap[tag] || '#f0c040';
  const bg = bgMap[tag] || 'rgba(240,192,64,0.12)';
  return L.divIcon({
    className:'',
    html:`<div class="pin-wrap">
      <div class="pin-body" style="background:${c};box-shadow:0 0 12px ${c}55">
        <div class="pin-emoji">${emoji||'📍'}</div>
      </div>
      <div class="pin-tail"></div>
    </div>`,
    iconSize:[36,44], iconAnchor:[18,44], popupAnchor:[0,-48],
  });
}

function renderMarkers(spots) {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  spots.forEach(s => {
    const m = L.marker([s.lat, s.lng], { icon: makeIcon(s.emoji, s.tag) })
      .addTo(map)
      .bindPopup(`
        <div class="popup-body">
          <div class="popup-title">${s.emoji||''} ${s.title}</div>
          <div class="popup-work">${s.work}</div>
          <div class="popup-loc">📍 ${s.location||'—'} · 📸 ${(s.count||0).toLocaleString()}枚</div>
          <button class="popup-cta" onclick="selectSpot('${s.id}')">詳細を見る →</button>
        </div>
      `, { maxWidth:220 })
      .on('click', () => selectSpot(s.id));
    markers[s.id] = m;
  });
  document.getElementById('countNum').innerHTML = `<span>${spots.length}</span>`;
  document.getElementById('drawerCount').textContent = `${spots.length} spots`;
}

function renderList(spots) {
  const list = document.getElementById('drawerList');
  if (!spots.length) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">スポットが見つかりません</div>';
    return;
  }
  const c = colorMap;
  const bg = bgMap;
  list.innerHTML = spots.map(s => `
    <div class="list-item ${currentSpot?.id===s.id?'active':''}" id="li-${s.id}" onclick="selectSpot('${s.id}')">
      <div class="list-item-emoji" style="background:${bg[s.tag]||'var(--card)'}">
        ${s.emoji||'📍'}
      </div>
      <div class="list-item-body">
        <div class="list-item-title">${s.title}</div>
        <div class="list-item-work">${s.work}</div>
        <div class="list-item-loc">📍 ${s.location||'—'}</div>
      </div>
      <div class="list-item-count">📸${(s.count||0).toLocaleString()}</div>
    </div>
  `).join('');
}

function selectSpot(id) {
  const s = allSpots.find(x => x.id === id);
  if (!s) return;
  currentSpot = s;

  // List highlight
  document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
  const li = document.getElementById('li-'+id);
  if (li) li.scrollIntoView({ behavior:'smooth', block:'nearest' });
  if (li) li.classList.add('active');

  // Fly map
  map.flyTo([s.lat, s.lng], 15, { duration:1.0 });
  if (markers[id]) markers[id].openPopup();

  // Sheet
  document.getElementById('sheetEmoji').textContent = s.emoji || '📍';
  document.getElementById('sheetTitle').textContent = s.title;
  document.getElementById('sheetWork').textContent = `${s.work}${s.ep?' · '+s.ep:''}`;
  document.getElementById('sheetTags').innerHTML = [
    s.location ? `<span class="sheet-tag">📍 ${s.location}</span>` : '',
    s.count ? `<span class="sheet-tag">📸 ${s.count.toLocaleString()}枚</span>` : '',
    s.diff ? `<span class="sheet-tag">${s.diff}</span>` : '',
  ].join('');
  document.getElementById('bottomSheet').classList.add('show');
  document.getElementById('listDrawer').classList.remove('expanded');
  listOpen = false;

  spawnSakura();
}

function closeSheet() {
  document.getElementById('bottomSheet').classList.remove('show');
  currentSpot = null;
  document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
}

function openNavi() {
  if (!currentSpot) return;
  window.open(`https://www.google.com/maps/search/?api=1&query=${currentSpot.lat},${currentSpot.lng}`, '_blank');
}

function toggleList() {
  const d = document.getElementById('listDrawer');
  listOpen = !listOpen;
  if (listOpen) {
    d.classList.add('expanded');
    closeSheet();
  } else {
    d.classList.remove('expanded');
  }
}

function filterSpots(tag, el) {
  currentFilter = tag;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filteredSpots = tag === 'all' ? [...allSpots] : allSpots.filter(s => s.tag === tag);
  renderMarkers(filteredSpots);
  renderList(filteredSpots);
  closeSheet();
  if (filteredSpots.length > 0) {
    map.flyToBounds(L.latLngBounds(filteredSpots.map(s => [s.lat,s.lng])), { padding:[60,80], duration:1.2 });
  }
}

function searchSpots(q) {
  const query = q.trim().toLowerCase();
  const base = currentFilter === 'all' ? allSpots : allSpots.filter(s => s.tag === currentFilter);
  const result = !query ? base : base.filter(s =>
    s.title.toLowerCase().includes(query) ||
    s.work.toLowerCase().includes(query) ||
    (s.location||'').toLowerCase().includes(query)
  );
  renderMarkers(result);
  renderList(result);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

function spawnSakura() {
  const emojis = ['🌸','✨','🌟','💫','🎴'];
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'sakura';
      el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      el.style.left = Math.random()*100 + 'vw';
      el.style.animationDuration = (2.5 + Math.random()*2) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }, i * 150);
  }
}

map.on('click', e => {
  if (!e.originalEvent.target.closest('.pin-wrap')) closeSheet();
});

// ── Boot ──
(async () => {
  try {
    allSpots = await fetchSpots();
    filteredSpots = [...allSpots];
    renderMarkers(filteredSpots);
    renderList(filteredSpots);
    if (allSpots.length > 0) {
      map.flyToBounds(L.latLngBounds(allSpots.map(s => [s.lat,s.lng])), { padding:[60,80], duration:1.5 });
    }
    document.getElementById('loadingOverlay').classList.add('hide');
    showToast(`✓ ${allSpots.length}件の聖地を発見！`);
    spawnSakura();
  } catch(e) {
    console.error(e);
    document.getElementById('loadingOverlay').classList.add('hide');
    document.getElementById('errorState').classList.remove('hide');
    document.getElementById('errorMsg').textContent = `${e.message}\n\nAPIキーまたはネットワークを確認してください。`;
  }
})();
</script>
</body>
</html>
